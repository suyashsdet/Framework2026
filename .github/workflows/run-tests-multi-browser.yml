# ============================================================
# Workflow  : Run Tests - Multi Browser
# Project   : Framework2026
# Author    : Suyash
# ============================================================
#
# WHAT THIS WORKFLOW DOES:
#   Manually triggered workflow that runs your TestNG test
#   suite across Chrome, Firefox, and Edge. After tests
#   finish, generates all 3 reports and publishes to Pages.
#
# PARALLEL VM MODE (use_matrix = true):
#   Each browser gets its OWN dedicated GitHub VM.
#   All 3 VMs start simultaneously and run in parallel.
#
#   VM 1 → Chrome  — all 5 test classes
#   VM 2 → Firefox — all 5 test classes
#   VM 3 → Edge    — all 5 test classes
#
#   This is the most powerful mode. Instead of one VM running
#   Chrome then Firefox then Edge sequentially, 3 VMs run
#   all browsers at the exact same time.
#   Expected time saving: ~66% faster than single VM.
#
# SINGLE VM MODE (use_matrix = false):
#   All 3 browsers run on one VM using the selected XML file.
#   The XML file controls browser execution (parallel or sequential).
#   Simpler, uses fewer GitHub Actions minutes.
#
# WHY NO BROWSER DROPDOWN:
#   The multi-browser XML files hardcode Chrome, Firefox, Edge
#   inside <parameter name="browser"> tags. In single VM mode
#   the XML controls browsers. In matrix mode each VM is
#   explicitly assigned one browser via -Dbrowser= flag.
#
# PARAMETERS EXPLAINED:
#   env        → which config file to load (default/dev/qa/stage/uat)
#   xml_file   → which multi-browser XML to use (single VM mode only)
#   headless   → run without visible window (must be true in CI)
#   incognito  → run with no cookies or cache
#   use_matrix → true = 3 parallel VMs (one per browser)
#                false = single VM with XML controlling browsers
# ============================================================

name: Run Tests - Multi Browser

on:
  workflow_dispatch:
    inputs:

      # -----------------------------------------------------------
      # PARAMETER 1 — ENVIRONMENT
      # Tells DriverFactory.initProperties() which config file
      # to load. Maps to System.getProperty("env") in your code.
      # "default" loads default.config.properties (no -Denv flag)
      # -----------------------------------------------------------
      env:
        description: "Environment to run tests on"
        type: choice
        options: [default, dev, qa, stage, uat]
        default: default

      # -----------------------------------------------------------
      # PARAMETER 2 — TESTNG XML SUITE
      # Used in SINGLE VM mode only (use_matrix = false).
      # Both options always run Chrome + Firefox + Edge.
      # In matrix mode this is ignored — each VM gets its own
      # browser assigned directly via -Dbrowser= flag.
      #
      #   parallel_multi_browser   → all browsers run simultaneously
      #   sequential_multi_browser → browsers run one after another
      # -----------------------------------------------------------
      xml_file:
        description: "TestNG XML suite (used in single VM mode only)"
        type: choice
        options:
          - testng_all_test_default_parallel_multi_browser.xml
          - testng_all_test_default_sequential_multi_browser.xml
        default: testng_all_test_default_parallel_multi_browser.xml

      # -----------------------------------------------------------
      # PARAMETER 3 — HEADLESS MODE
      # true  → browsers run without visible windows.
      #         REQUIRED on GitHub runners — no display screen.
      # false → full UI browsers (only works locally).
      # -----------------------------------------------------------
      headless:
        description: "Run browsers in headless mode (must be true in CI)"
        type: boolean
        default: true

      # -----------------------------------------------------------
      # PARAMETER 4 — INCOGNITO MODE
      # true  → all browsers start fresh with no cookies/cache.
      # false → browsers use default profiles.
      # -----------------------------------------------------------
      incognito:
        description: "Run browsers in incognito mode"
        type: boolean
        default: true

      # -----------------------------------------------------------
      # PARAMETER 5 — PARALLEL VM MATRIX
      # false (default) → all 3 browsers run on ONE GitHub VM.
      #   The XML file controls which browsers run and how.
      #   Simpler, uses fewer GitHub Actions minutes.
      #
      # true → each browser gets its OWN dedicated GitHub VM.
      #   3 VMs spin up simultaneously:
      #
      #   VM 1 (chrome)  → runs all 5 test classes on Chrome
      #   VM 2 (firefox) → runs all 5 test classes on Firefox
      #   VM 3 (edge)    → runs all 5 test classes on Edge
      #
      #   All 3 start at the same time. Total time = time of
      #   the slowest browser, not sum of all 3 browsers.
      #   Expected time saving: ~66% faster than single VM.
      #
      #   Each VM uploads its own Allure results. The merge job
      #   combines all 3 into one unified report showing results
      #   from all browsers side by side.
      #
      # NOTE: In matrix mode the xml_file dropdown is ignored.
      #       Each VM uses the parallel single-browser XML and
      #       receives its browser via -Dbrowser= flag directly.
      # -----------------------------------------------------------
      use_matrix:
        description: "Give each browser its own parallel VM (3x faster)"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # =================================================================
  # JOB 1A — SINGLE VM TEST RUN
  # =================================================================
  # Runs when use_matrix = false.
  # One VM runs all 3 browsers using the selected multi-browser XML.
  # The XML <parameter name="browser"> tags control which browsers run.
  # =================================================================
  test-single-vm:
    name: "Single VM | ${{ inputs.env }} | Chrome + Firefox + Edge"
    if: ${{ inputs.use_matrix == false }}
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Print run configuration
        run: |
          echo "=================================================="
          echo "  MODE         : Single VM"
          echo "  Environment  : ${{ inputs.env }}"
          echo "  Browsers     : Chrome + Firefox + Edge (via XML)"
          echo "  XML Suite    : ${{ inputs.xml_file }}"
          echo "  Headless     : ${{ inputs.headless }}"
          echo "  Incognito    : ${{ inputs.incognito }}"
          echo "=================================================="

      - name: Run TestNG suite
        continue-on-error: true
        run: |
          ENV_FLAG=""
          if [ "${{ inputs.env }}" != "default" ]; then
            ENV_FLAG="-Denv=${{ inputs.env }}"
          fi
          mvn clean test $ENV_FLAG \
            -Dheadless=${{ inputs.headless }} \
            -Dincognito=${{ inputs.incognito }} \
            -Dsurefire.suiteXmlFiles=src/test/resources/testrunners/${{ inputs.xml_file }} \
            -B

      - name: Generate Allure report
        if: always()
        run: mvn allure:report -B

      - name: Prepare and upload GitHub Pages content
        if: always()
        run: |
          mkdir -p reports/testng reports/chaintest reports/allure
          cp -r target/surefire-reports/. reports/testng/ 2>/dev/null || true
          cp -r target/chaintest/. reports/chaintest/ 2>/dev/null || true
          cp -r target/site/allure-maven-plugin/. reports/allure/ 2>/dev/null || true
          cat > reports/index.html << 'EOF'
          <!DOCTYPE html><html><head><title>Framework2026 Reports</title>
          <style>body{font-family:Arial,sans-serif;max-width:600px;margin:60px auto;background:#f5f5f5}
          .card{background:white;border-radius:8px;padding:20px;margin:16px 0;box-shadow:0 2px 6px rgba(0,0,0,.1)}
          a{color:#0066cc;font-size:18px;text-decoration:none;font-weight:bold}
          p{color:#666;margin:6px 0 0;font-size:14px}</style></head><body>
          <h1>Framework2026 — Test Reports</h1>
          <div class="card"><a href="allure/index.html">📊 Allure Report</a><p>Rich dashboard with charts and timeline</p></div>
          <div class="card"><a href="chaintest/Index.html">🔗 ChainTest Report</a><p>Dark theme report with screenshots</p></div>
          <div class="card"><a href="testng/index.html">✅ TestNG Report</a><p>Pass/fail per test with stack traces</p></div>
          </body></html>
          EOF

      - name: Upload to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  # =================================================================
  # JOB 1B — PARALLEL VM MATRIX TEST RUN
  # =================================================================
  # Runs when use_matrix = true.
  #
  # matrix.browser defines 3 entries: chrome, firefox, edge.
  # GitHub spins up one fresh VM per entry simultaneously.
  # Each VM receives its browser via -Dbrowser= flag.
  #
  # fail-fast: false → if Chrome VM fails, Firefox and Edge
  #   VMs keep running. You get results from all 3 browsers
  #   even if one has failures.
  # =================================================================
  test-matrix:
    name: "Matrix | ${{ inputs.env }} | ${{ matrix.browser }}"
    if: ${{ inputs.use_matrix == true }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # -----------------------------------------------------------
        # One VM is created for each browser in this list.
        # All 3 VMs start at the same time on separate machines.
        # Each VM runs the full test suite for its assigned browser.
        # -----------------------------------------------------------
        browser: [chrome, firefox, edge]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Print VM configuration
        run: |
          echo "=================================================="
          echo "  MODE         : Parallel VM Matrix"
          echo "  This VM      : ${{ matrix.browser }}"
          echo "  Environment  : ${{ inputs.env }}"
          echo "  Headless     : ${{ inputs.headless }}"
          echo "  Incognito    : ${{ inputs.incognito }}"
          echo "  Other VMs    : running chrome/firefox/edge in parallel"
          echo "=================================================="

      # -----------------------------------------------------------
      # Each VM runs the parallel single-browser XML with its
      # assigned browser passed via -Dbrowser= flag.
      # This gives each browser a clean isolated environment.
      # -----------------------------------------------------------
      - name: Run tests on ${{ matrix.browser }}
        continue-on-error: true
        run: |
          ENV_FLAG=""
          if [ "${{ inputs.env }}" != "default" ]; then
            ENV_FLAG="-Denv=${{ inputs.env }}"
          fi
          mvn clean test $ENV_FLAG \
            -Dbrowser=${{ matrix.browser }} \
            -Dheadless=${{ inputs.headless }} \
            -Dincognito=${{ inputs.incognito }} \
            -Dsurefire.suiteXmlFiles=src/test/resources/testrunners/testng_all_test_default_parallel.xml \
            -B

      # -----------------------------------------------------------
      # Each browser VM uploads its own Allure results.
      # Named with browser name so artifacts don't overwrite.
      # The merge job combines all 3 into one unified report.
      # -----------------------------------------------------------
      - name: Upload Allure results for ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/
          retention-days: 1

      - name: Upload ChainTest results for ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaintest-results-${{ matrix.browser }}
          path: target/chaintest/
          retention-days: 1

      - name: Upload surefire results for ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-results-${{ matrix.browser }}
          path: target/surefire-reports/
          retention-days: 1

  # =================================================================
  # JOB 2 — MERGE RESULTS AND GENERATE REPORTS (matrix mode only)
  # =================================================================
  # Waits for all 3 browser VMs to finish (needs: test-matrix).
  # Downloads allure-results from Chrome, Firefox, and Edge VMs.
  # Merges all results into one folder and generates a single
  # unified Allure report showing all 3 browsers side by side.
  # =================================================================
  merge-and-report:
    name: Merge all browser results and publish reports
    if: ${{ inputs.use_matrix == true }}
    needs: test-matrix
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # -----------------------------------------------------------
      # Downloads Allure results from all 3 browser VMs into
      # the same target/allure-results/ folder. Allure then
      # generates one report showing Chrome, Firefox, and Edge
      # results together with browser labels on each test.
      # -----------------------------------------------------------
      # -----------------------------------------------------------
      # WHY SEPARATE SUBFOLDERS FOR SUREFIRE:
      # Surefire names XML files after the test class:
      #   TEST-tests.LoginPageTest.xml
      #   TEST-tests.AccountsPageTest.xml
      # Chrome, Firefox and Edge all produce files with the
      # EXACT same names. If all 3 download into the same folder,
      # Edge overwrites Firefox which overwrites Chrome — you
      # end up with only 25 tests (1 browser) instead of 75.
      #
      # Allure uses UUID filenames so it is safe to merge directly.
      # -----------------------------------------------------------

      - name: Download Chrome Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chrome
          path: target/allure-results/

      - name: Download Firefox Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: target/allure-results/

      - name: Download Edge Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-edge
          path: target/allure-results/

      - name: Download Chrome ChainTest results
        uses: actions/download-artifact@v4
        with:
          name: chaintest-results-chrome
          path: chaintest-chrome/

      - name: Download Firefox ChainTest results
        uses: actions/download-artifact@v4
        with:
          name: chaintest-results-firefox
          path: chaintest-firefox/

      - name: Download Edge ChainTest results
        uses: actions/download-artifact@v4
        with:
          name: chaintest-results-edge
          path: chaintest-edge/

      - name: Merge ChainTest results from all browsers
        run: |
          mkdir -p target/chaintest
          cp -r chaintest-chrome/. target/chaintest/ 2>/dev/null || true
          cp -r chaintest-firefox/. target/chaintest/ 2>/dev/null || true
          cp -r chaintest-edge/. target/chaintest/ 2>/dev/null || true

      - name: Download Chrome surefire results
        uses: actions/download-artifact@v4
        with:
          name: surefire-results-chrome
          path: surefire-chrome/

      - name: Download Firefox surefire results
        uses: actions/download-artifact@v4
        with:
          name: surefire-results-firefox
          path: surefire-firefox/

      - name: Download Edge surefire results
        uses: actions/download-artifact@v4
        with:
          name: surefire-results-edge
          path: surefire-edge/

      - name: Merge surefire results from all browsers
        run: |
          mkdir -p target/surefire-reports
          cp -r surefire-chrome/. target/surefire-reports/
          cp -r surefire-firefox/. target/surefire-reports/
          cp -r surefire-edge/. target/surefire-reports/
          echo "Total surefire XML files after merge:"
          ls target/surefire-reports/*.xml 2>/dev/null | wc -l

      - name: Generate merged Allure report
        if: always()
        run: mvn allure:report -B

      - name: Prepare and upload GitHub Pages content
        if: always()
        run: |
          mkdir -p reports/testng reports/chaintest reports/allure
          cp -r target/surefire-reports/. reports/testng/ 2>/dev/null || true
          cp -r target/chaintest/. reports/chaintest/ 2>/dev/null || true
          cp -r target/site/allure-maven-plugin/. reports/allure/ 2>/dev/null || true
          cat > reports/index.html << 'EOF'
          <!DOCTYPE html><html><head><title>Framework2026 Reports</title>
          <style>body{font-family:Arial,sans-serif;max-width:600px;margin:60px auto;background:#f5f5f5}
          .card{background:white;border-radius:8px;padding:20px;margin:16px 0;box-shadow:0 2px 6px rgba(0,0,0,.1)}
          a{color:#0066cc;font-size:18px;text-decoration:none;font-weight:bold}
          p{color:#666;margin:6px 0 0;font-size:14px}</style></head><body>
          <h1>Framework2026 — Test Reports (Chrome + Firefox + Edge merged)</h1>
          <div class="card"><a href="allure/index.html">📊 Allure Report</a><p>Merged results from all 3 browser VMs</p></div>
          <div class="card"><a href="chaintest/Index.html">🔗 ChainTest Report</a><p>Dark theme report with screenshots</p></div>
          <div class="card"><a href="testng/index.html">✅ TestNG Report</a><p>Pass/fail per test with stack traces</p></div>
          </body></html>
          EOF

      - name: Upload to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  # =================================================================
  # JOB 3 — DEPLOY TO GITHUB PAGES
  # =================================================================
  deploy:
    name: Publish reports to GitHub Pages
    needs: [test-single-vm, merge-and-report]
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
