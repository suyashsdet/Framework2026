# ============================================================
# Workflow  : Run Tests - Multi Browser
# Project   : Framework2026
# Author    : Suyash
# ============================================================
#
# WHAT THIS WORKFLOW DOES:
#   Manually triggered workflow that runs your TestNG test
#   suite across ALL THREE browsers simultaneously:
#   Chrome, Firefox, and Edge — in a single run.
#   After tests finish, it generates all 3 reports and
#   publishes them to GitHub Pages so you can open them
#   directly in a browser via a live URL.
#
# WHEN TO USE THIS WORKFLOW:
#   Use this for full cross-browser regression testing.
#   The XML files used here have browser hardcoded inside
#   each <test> block so all 3 browsers always run. You control:
#     - Which environment  (default / dev / qa / stage / uat)
#     - Which XML suite    (parallel or sequential)
#     - Headless mode      (true = no visible browser window)
#     - Incognito mode     (true = no cookies / cache)
#
# WHY THERE IS NO BROWSER DROPDOWN HERE:
#   The multi-browser XML files hardcode Chrome, Firefox, and
#   Edge as separate <test> blocks inside the XML:
#
#     <test name="Login Page Test Chrome">
#       <parameter name="browser" value="chrome"/>
#     </test>
#     <test name="Login Page Test Firefox">
#       <parameter name="browser" value="firefox"/>
#     </test>
#     <test name="Login Page Test Edge">
#       <parameter name="browser" value="edge"/>
#     </test>
#
#   These XML <parameter> values are read directly by
#   BaseTest.setup() and override anything passed via
#   -Dbrowser= on the command line. So a browser dropdown
#   would be misleading and ignored — intentionally excluded.
#
# WHEN NOT TO USE THIS WORKFLOW:
#   If you want to run tests on ONE specific browser only,
#   use the "Run Tests - Single Browser" workflow instead.
#
# REPORTS GENERATED (all accessible via live URL):
#   After every run, 3 reports are published to GitHub Pages:
#
#   TestNG Report:
#     https://suyashsdet.github.io/Framework2026/testng/
#     Generated by Maven Surefire. Shows pass/fail per test
#     method with stack traces for failures.
#
#   ChainTest Report:
#     https://suyashsdet.github.io/Framework2026/chaintest/
#     Generated by ChainTest library. Full interactive dark
#     theme report with screenshots and email summary.
#
#   Allure Report:
#     https://suyashsdet.github.io/Framework2026/allure/
#     Generated by Allure. Rich dashboard with charts,
#     timeline, per-test steps, and categories.
#
#   NOTE: GitHub Pages always shows the LATEST run's reports.
#   Each new run overwrites the previous reports on the site.
#
# HOW TO TRIGGER:
#   1. Go to GitHub → Actions tab
#   2. Click "Run Tests - Multi Browser" in the left panel
#   3. Click the "Run workflow" button (top right)
#   4. Fill in the dropdown parameters
#   5. Click the green "Run workflow" button
#   6. After the run completes, open the report URLs above
# ============================================================

name: Run Tests - Multi Browser

# -----------------------------------------------------------------
# TRIGGERS
# workflow_dispatch → manually triggered only via the
# "Run workflow" button on the GitHub Actions tab.
# Does NOT run automatically on push or pull_request.
#
# NOTE: There is intentionally NO browser parameter here.
# The multi-browser XML files control which browsers run.
# -----------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:

      # -----------------------------------------------------------
      # PARAMETER 1 — ENVIRONMENT
      # Tells DriverFactory.initProperties() which config file
      # to load. Maps to System.getProperty("env") in your code.
      # "default" means no -Denv flag → loads default.config.properties
      # -----------------------------------------------------------
      env:
        description: "Environment to run tests on"
        type: choice
        options:
          - default
          - dev
          - qa
          - stage
          - uat
        default: default

      # -----------------------------------------------------------
      # PARAMETER 2 — TESTNG XML SUITE
      # Which multi-browser TestNG XML file to use.
      # Both options run Chrome + Firefox + Edge together.
      # Browser is NOT a parameter here because these XML files
      # hardcode all 3 browsers inside <parameter> tags.
      #
      #   parallel_multi_browser   → all test classes AND all
      #                              browsers run at the same time
      #                              fastest option, uses most memory
      #
      #   sequential_multi_browser → browsers run one after another
      #                              slower but easier to debug
      # -----------------------------------------------------------
      xml_file:
        description: "TestNG XML suite to run (always runs Chrome + Firefox + Edge)"
        type: choice
        options:
          - testng_all_test_default_parallel_multi_browser.xml
          - testng_all_test_default_sequential_multi_browser.xml
        default: testng_all_test_default_parallel_multi_browser.xml

      # -----------------------------------------------------------
      # PARAMETER 3 — HEADLESS MODE
      # true  → all 3 browsers run without opening visible windows.
      #         GitHub runners have no display so this MUST be
      #         true when running in CI/GitHub Actions.
      # false → browsers open with full UI. Only use locally.
      # -----------------------------------------------------------
      headless:
        description: "Run browsers in headless mode (must be true in CI)"
        type: boolean
        default: true

      # -----------------------------------------------------------
      # PARAMETER 4 — INCOGNITO MODE
      # true  → all 3 browsers start fresh with no cookies,
      #         no cache, no saved logins. Ensures tests are
      #         not affected by previous sessions.
      # false → browsers use their default profiles
      # -----------------------------------------------------------
      incognito:
        description: "Run browsers in incognito mode"
        type: boolean
        default: true

# -----------------------------------------------------------------
# PERMISSIONS
# These permissions are REQUIRED for GitHub Pages publishing.
#
#   contents: read    → allows checkout action to read the repo
#   pages: write      → allows deploying to GitHub Pages
#   id-token: write   → allows GitHub Pages deployment to verify
#                       the identity of this workflow run
# -----------------------------------------------------------------
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: >
      Tests | ENV=${{ inputs.env }}
      | Chrome + Firefox + Edge
      | ${{ inputs.xml_file }}
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------
      # STEP 1 — CHECKOUT
      # Clones the repository onto the GitHub runner so Maven
      # can find pom.xml, source files, and XML suite files.
      # -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # STEP 2 — SET UP JAVA 24
      # Installs Java 24 on the runner matching your pom.xml
      # compiler configuration (source/target = 24).
      # -----------------------------------------------------------
      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      # -----------------------------------------------------------
      # STEP 3 — CACHE MAVEN DEPENDENCIES
      # Caches ~/.m2/repository so dependencies are not
      # re-downloaded on every run. Cache key is based on
      # pom.xml content — refreshes automatically when
      # dependencies change. Reduces build time significantly.
      # -----------------------------------------------------------
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # -----------------------------------------------------------
      # STEP 4 — PRINT RUN CONFIGURATION
      # Prints a clear summary of all selected parameters before
      # the tests start. Useful for debugging and audit trail.
      # Browser is shown as "Chrome + Firefox + Edge" because
      # the multi-browser XML always runs all 3 browsers.
      # -----------------------------------------------------------
      - name: Print run configuration
        run: |
          echo "=================================================="
          echo "  TEST RUN CONFIGURATION"
          echo "=================================================="
          echo "  Environment  : ${{ inputs.env }}"
          echo "  Browsers     : Chrome + Firefox + Edge"
          echo "  XML Suite    : ${{ inputs.xml_file }}"
          echo "  Headless     : ${{ inputs.headless }}"
          echo "  Incognito    : ${{ inputs.incognito }}"
          echo "  NOTE: Browser is controlled by the XML file."
          echo "        All 3 browsers always run in this workflow."
          echo "=================================================="

      # -----------------------------------------------------------
      # STEP 5 — RUN TESTS
      # Runs mvn clean test with all selected parameters.
      #
      #   clean  → deletes target/ folder before running so
      #            there are no leftover files from previous runs
      #
      #   test   → compiles and runs all tests across all 3 browsers
      #
      #   -Denv        → loads matching .config.properties file
      #                  skipped when "default" is selected
      #   -Dheadless   → overrides headless in config file
      #   -Dincognito  → overrides incognito in config file
      #
      #   NOTE: No -Dbrowser flag — browser is controlled
      #         entirely by the XML <parameter> tags
      #
      #   -Dsurefire.suiteXmlFiles → overrides the XML hardcoded
      #                  in pom.xml surefire plugin config
      #
      #   -B → batch mode, clean log output (no download bars)
      #
      #   continue-on-error: true → CRITICAL: even if tests fail,
      #     the workflow continues to generate and publish reports.
      #     Without this, a single test failure would stop the
      #     workflow and you would get no reports at all.
      # -----------------------------------------------------------
      - name: Run TestNG suite
        continue-on-error: true
        run: |
          ENV_FLAG=""
          if [ "${{ inputs.env }}" != "default" ]; then
            ENV_FLAG="-Denv=${{ inputs.env }}"
          fi

          mvn clean test $ENV_FLAG \
            -Dheadless=${{ inputs.headless }} \
            -Dincognito=${{ inputs.incognito }} \
            -Dsurefire.suiteXmlFiles=src/test/resources/testrunners/${{ inputs.xml_file }} \
            -B

      # -----------------------------------------------------------
      # STEP 6 — GENERATE ALLURE REPORT
      # -----------------------------------------------------------
      # Allure works in two stages:
      #
      # STAGE 1 — Raw results (produced during mvn test above)
      #   allure-testng listener writes one JSON file per test
      #   into target/allure-results/ as defined in:
      #     allure.properties → allure.results.directory=target/allure-results
      #
      # STAGE 2 — HTML generation (this step)
      #   mvn allure:report reads the raw JSON files and builds
      #   a full interactive HTML report in:
      #     target/site/allure-maven-plugin/
      #   The report includes:
      #     - Overview dashboard with pass/fail/skip charts
      #     - Test suites tree breakdown per browser
      #     - Timeline showing all 3 browsers running in parallel
      #     - Per-test detail with steps, attachments, logs
      #     - Categories view for failures and broken tests
      #
      #   if: always() → runs even if tests failed so the
      #   report always gets generated and published.
      # -----------------------------------------------------------
      - name: Generate Allure report
        if: always()
        run: mvn allure:report -B

      # -----------------------------------------------------------
      # STEP 7 — PREPARE GITHUB PAGES CONTENT
      # -----------------------------------------------------------
      # GitHub Pages serves ONE folder as a website. We need all
      # 3 reports in one place so they are all accessible via URL.
      #
      # This step creates a "reports" staging folder and copies:
      #   target/surefire-reports/        → reports/testng/
      #   target/chaintest/               → reports/chaintest/
      #   target/site/allure-maven-plugin → reports/allure/
      #
      # It also creates a reports/index.html landing page with
      # clickable links to all 3 reports — so you have one
      # single entry point URL to share with anyone.
      #
      # if: always() → runs even if tests failed so reports
      # are always published regardless of test outcome.
      # -----------------------------------------------------------
      - name: Prepare GitHub Pages content
        if: always()
        run: |
          mkdir -p reports/testng reports/chaintest reports/allure

          cp -r target/surefire-reports/. reports/testng/ 2>/dev/null || echo "No TestNG report found"
          cp -r target/chaintest/. reports/chaintest/ 2>/dev/null || echo "No ChainTest report found"
          cp -r target/site/allure-maven-plugin/. reports/allure/ 2>/dev/null || echo "No Allure report found"

          cat > reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Framework2026 Test Reports</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 600px;
                     margin: 60px auto; background: #f5f5f5; }
              h1   { color: #333; }
              .card { background: white; border-radius: 8px;
                      padding: 20px; margin: 16px 0;
                      box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
              a    { color: #0066cc; font-size: 18px;
                     text-decoration: none; font-weight: bold; }
              a:hover { text-decoration: underline; }
              p    { color: #666; margin: 6px 0 0; font-size: 14px; }
            </style>
          </head>
          <body>
            <h1>Framework2026 — Test Reports</h1>
            <div class="card">
              <a href="allure/index.html">Allure Report</a>
              <p>Rich dashboard with charts, timeline, and per-test details</p>
            </div>
            <div class="card">
              <a href="chaintest/Index.html"> ChainTest Report</a>
              <p>Interactive dark theme report with screenshots</p>
            </div>
            <div class="card">
              <a href="testng/index.html">TestNG Report</a>
              <p>Pass/fail per test method with stack traces</p>
            </div>
          </body>
          </html>
          EOF

      # -----------------------------------------------------------
      # STEP 8 — UPLOAD TO GITHUB PAGES
      # -----------------------------------------------------------
      # actions/upload-pages-artifact packages the "reports"
      # folder created in the previous step and prepares it
      # for deployment to GitHub Pages.
      #
      # This is different from actions/upload-artifact:
      #   upload-artifact       → creates a downloadable ZIP
      #   upload-pages-artifact → prepares content for a live URL
      #
      # if: always() → uploads even if tests failed.
      # -----------------------------------------------------------
      - name: Upload reports to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  # -----------------------------------------------------------------
  # JOB 2 — DEPLOY TO GITHUB PAGES
  # -----------------------------------------------------------------
  # This is a SEPARATE job from the test job above.
  # It only runs after the test job finishes (needs: test).
  #
  # Why a separate job?
  #   GitHub Pages deployment requires its own isolated job
  #   with a specific environment declaration. It cannot be
  #   done as a step inside the test job.
  #
  # What it does:
  #   actions/deploy-pages takes the artifact uploaded in
  #   Step 8 above and publishes it to GitHub Pages.
  #   After this job completes, your reports are live at:
  #
  #    https://suyashsdet.github.io/Framework2026/
  #   https://suyashsdet.github.io/Framework2026/allure/
  #    https://suyashsdet.github.io/Framework2026/chaintest/
  #   https://suyashsdet.github.io/Framework2026/testng/
  #
  # if: always() → deploys even if the test job had failures
  #   so reports are always published.
  # -----------------------------------------------------------------
  deploy:
    name: Publish reports to GitHub Pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # -----------------------------------------------------------
      # STEP 1 — DEPLOY TO GITHUB PAGES
      # Publishes the uploaded artifact to GitHub Pages.
      # The output "page_url" contains the live URL which is
      # shown in the GitHub Actions run summary as a clickable
      # link — no need to remember the URL manually.
      # -----------------------------------------------------------
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
