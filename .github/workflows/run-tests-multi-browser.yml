# ============================================================
# Workflow  : Run Tests - Multi Browser
# Project   : Framework2026
# Author    : Suyash
# ============================================================
#
# WHAT THIS WORKFLOW DOES:
#   Manually triggered workflow that runs your TestNG test
#   suite across ALL THREE browsers simultaneously:
#   Chrome, Firefox, and Edge — in a single run.
#
# WHEN TO USE THIS WORKFLOW:
#   Use this for full cross-browser regression testing.
#   The XML files used here have browser hardcoded inside
#   each <test> block so all 3 browsers always run regardless
#   of any external parameter. You control:
#     - Which environment  (default / dev / qa / stage / uat)
#     - Which XML suite    (parallel or sequential)
#     - Headless mode      (true = no visible browser window)
#     - Incognito mode     (true = no cookies / cache)
#
# WHY THERE IS NO BROWSER DROPDOWN HERE:
#   The multi-browser XML files hardcode Chrome, Firefox, and
#   Edge as separate <test> blocks inside the XML:
#
#     <test name="Login Page Test Chrome">
#       <parameter name="browser" value="chrome"/>
#     </test>
#     <test name="Login Page Test Firefox">
#       <parameter name="browser" value="firefox"/>
#     </test>
#     <test name="Login Page Test Edge">
#       <parameter name="browser" value="edge"/>
#     </test>
#
#   These XML <parameter> values are read directly by
#   BaseTest.setup() and override anything passed via
#   -Dbrowser= on the command line. So a browser dropdown
#   would be misleading and ignored — it is intentionally
#   excluded from this workflow.
#
# WHEN NOT TO USE THIS WORKFLOW:
#   If you want to run tests on ONE specific browser only,
#   use the "Run Tests - Single Browser" workflow instead.
#
# HOW TO TRIGGER:
#   1. Go to GitHub → Actions tab
#   2. Click "Run Tests - Multi Browser" in the left panel
#   3. Click the "Run workflow" button (top right)
#   4. Fill in the dropdown parameters
#   5. Click the green "Run workflow" button
#
# PARAMETERS EXPLAINED:
#   env:
#     Which config file to load from:
#       src/main/resources/config/<env>.config.properties
#     Each env has its own URL, username, password settings.
#     "default" loads default.config.properties
#
#   xml_file:
#     Which multi-browser TestNG XML suite file to run.
#     Both options run Chrome + Firefox + Edge together.
#       - parallel   : all test classes AND browsers run
#                      simultaneously (fastest, uses most memory)
#       - sequential : browsers run one after another
#                      (slower but easier to debug failures)
#
#   headless:
#     true  = browser runs without a visible UI window.
#             REQUIRED for CI — GitHub runners have no
#             display screen so headless must be true.
#     false = browser opens with full UI (only works locally)
#
#   incognito:
#     true  = browser starts with no cookies, no cache,
#             no saved sessions — clean slate every run.
#     false = browser uses default profile
#
# WHAT THE MVN COMMAND LOOKS LIKE:
#   mvn clean test
#     -Denv=qa
#     -Dheadless=true
#     -Dincognito=true
#     -Dsurefire.suiteXmlFiles=src/test/resources/testrunners/
#       testng_all_test_default_parallel_multi_browser.xml
#
# WHAT HAPPENS WHEN TESTS PASS:
#   - Maven prints "BUILD SUCCESS"
#   - Job exits with code 0 → green ✓
#
# WHAT HAPPENS WHEN TESTS FAIL:
#   - Maven prints "BUILD FAILURE" with failed test details
#   - Job exits with code 1 → red ✗
#   - Check the logs for exact test name, browser, and
#     failure reason
# ============================================================

name: Run Tests - Multi Browser

# -----------------------------------------------------------------
# TRIGGER — workflow_dispatch
# This workflow is MANUALLY triggered only. It does NOT run
# automatically on push or pull_request.
#
# workflow_dispatch adds a "Run workflow" button on the
# GitHub Actions tab where you fill in the parameters below
# before starting the run.
#
# NOTE: There is intentionally NO browser parameter here.
# The multi-browser XML files control which browsers run.
# See the documentation above for full explanation.
# -----------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:

      # -----------------------------------------------------------
      # PARAMETER 1 — ENVIRONMENT
      # Tells DriverFactory.initProperties() which config file
      # to load. Maps to System.getProperty("env") in your code.
      # "default" means no -Denv flag → loads default.config.properties
      # -----------------------------------------------------------
      env:
        description: "Environment to run tests on"
        type: choice
        options:
          - default
          - dev
          - qa
          - stage
          - uat
        default: default

      # -----------------------------------------------------------
      # PARAMETER 2 — TESTNG XML SUITE
      # Which multi-browser TestNG XML file to use.
      # Both options run Chrome + Firefox + Edge together.
      # Browser is NOT a parameter here because these XML files
      # hardcode all 3 browsers inside <parameter> tags.
      #
      #   parallel_multi_browser   → all test classes AND all
      #                              browsers run at the same time
      #                              fastest option, uses most memory
      #
      #   sequential_multi_browser → browsers run one after another
      #                              slower but easier to debug
      # -----------------------------------------------------------
      xml_file:
        description: "TestNG XML suite to run (all run Chrome + Firefox + Edge)"
        type: choice
        options:
          - testng_all_test_default_parallel_multi_browser.xml
          - testng_all_test_default_sequential_multi_browser.xml
        default: testng_all_test_default_parallel_multi_browser.xml

      # -----------------------------------------------------------
      # PARAMETER 3 — HEADLESS MODE
      # true  → browser runs without opening a visible window.
      #         GitHub runners have no display so this MUST be
      #         true when running in CI/GitHub Actions.
      # false → browser opens with full UI. Only use locally.
      # -----------------------------------------------------------
      headless:
        description: "Run browsers in headless mode (must be true in CI)"
        type: boolean
        default: true

      # -----------------------------------------------------------
      # PARAMETER 4 — INCOGNITO MODE
      # true  → all 3 browsers start fresh with no cookies,
      #         no cache, no saved logins. Ensures tests are
      #         not affected by previous sessions.
      # false → browsers use their default profiles
      # -----------------------------------------------------------
      incognito:
        description: "Run browsers in incognito mode"
        type: boolean
        default: true

jobs:
  test:
    name: >
      Tests | ENV=${{ inputs.env }}
      | Chrome + Firefox + Edge
      | ${{ inputs.xml_file }}
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------
      # STEP 1 — CHECKOUT
      # Clones the repository onto the GitHub runner so Maven
      # can find pom.xml, source files, and XML suite files.
      # -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # STEP 2 — SET UP JAVA 24
      # Installs Java 24 on the runner matching your pom.xml
      # compiler configuration (source/target = 24).
      # -----------------------------------------------------------
      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      # -----------------------------------------------------------
      # STEP 3 — CACHE MAVEN DEPENDENCIES
      # Caches ~/.m2/repository so dependencies are not
      # re-downloaded on every run. Cache key is based on
      # pom.xml content — refreshes automatically when
      # dependencies change.
      # -----------------------------------------------------------
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # -----------------------------------------------------------
      # STEP 4 — PRINT RUN CONFIGURATION
      # Prints a clear summary of all selected parameters before
      # the tests start. Useful for debugging and audit trail.
      # Browser is shown as "Chrome + Firefox + Edge" because
      # the multi-browser XML always runs all 3 browsers.
      # -----------------------------------------------------------
      - name: Print run configuration
        run: |
          echo "=================================================="
          echo "  TEST RUN CONFIGURATION"
          echo "=================================================="
          echo "  Environment  : ${{ inputs.env }}"
          echo "  Browsers     : Chrome + Firefox + Edge"
          echo "  XML Suite    : ${{ inputs.xml_file }}"
          echo "  Headless     : ${{ inputs.headless }}"
          echo "  Incognito    : ${{ inputs.incognito }}"
          echo "  NOTE: Browser is controlled by the XML file."
          echo "        All 3 browsers always run in this workflow."
          echo "=================================================="

      # -----------------------------------------------------------
      # STEP 5 — RUN TESTS
      # Runs mvn clean test with all selected parameters:
      #
      #   clean  → deletes target/ folder before running so
      #            there are no leftover files from previous runs
      #
      #   test   → compiles and runs all tests defined in the
      #            selected XML suite file across all 3 browsers
      #
      #   -Denv  → tells DriverFactory which config file to load
      #            skipped if "default" is selected since your
      #            code loads default.config.properties when
      #            System.getProperty("env") is null
      #
      #   -Dheadless   → overrides headless in config file
      #   -Dincognito  → overrides incognito in config file
      #
      #   NOTE: No -Dbrowser flag here — browser is controlled
      #         entirely by the XML <parameter> tags
      #
      #   -Dsurefire.suiteXmlFiles → overrides the XML file
      #            hardcoded in pom.xml surefire plugin config
      #
      #   -B → batch mode, clean log output (no download bars)
      # -----------------------------------------------------------
      # -----------------------------------------------------------
      # STEP 5 — RUN TESTS
      # Runs mvn clean test with all selected parameters:
      #
      #   clean  → deletes target/ folder before running so
      #            there are no leftover files from previous runs
      #
      #   test   → compiles and runs all tests defined in the
      #            selected XML suite file across all 3 browsers
      #
      #   -Denv  → tells DriverFactory which config file to load
      #            skipped if "default" is selected since your
      #            code loads default.config.properties when
      #            System.getProperty("env") is null
      #
      #   -Dheadless   → overrides headless in config file
      #   -Dincognito  → overrides incognito in config file
      #
      #   NOTE: No -Dbrowser flag here — browser is controlled
      #         entirely by the XML <parameter> tags
      #
      #   -Dsurefire.suiteXmlFiles → overrides the XML file
      #            hardcoded in pom.xml surefire plugin config
      #
      #   -B → batch mode, clean log output (no download bars)
      #
      #   continue-on-error: true → IMPORTANT: even if some
      #            tests fail, the workflow continues to the
      #            report steps below. Without this, a test
      #            failure would stop the workflow and you
      #            would never see the reports.
      # -----------------------------------------------------------
      - name: Run TestNG suite
        continue-on-error: true
        run: |
          ENV_FLAG=""
          if [ "${{ inputs.env }}" != "default" ]; then
            ENV_FLAG="-Denv=${{ inputs.env }}"
          fi

          mvn clean test $ENV_FLAG \
            -Dheadless=${{ inputs.headless }} \
            -Dincognito=${{ inputs.incognito }} \
            -Dsurefire.suiteXmlFiles=src/test/resources/testrunners/${{ inputs.xml_file }} \
            -B

      # -----------------------------------------------------------
      # STEP 6 — UPLOAD TESTNG REPORT
      # -----------------------------------------------------------
      # TestNG automatically generates an HTML report after every
      # run. It is saved to target/surefire-reports/ by Maven
      # Surefire plugin and contains:
      #   - Total tests passed / failed / skipped
      #   - Each test method result with duration
      #   - Stack traces for failed tests
      #   - index.html is the main entry point to open
      #
      # actions/upload-artifact uploads this folder as a ZIP
      # file attached to the workflow run. You can download it
      # from the GitHub Actions run summary page.
      #
      # if: always() → uploads the report even if tests failed
      #   or the previous step errored. Without this, a test
      #   failure would skip the upload and you would have no
      #   report to look at.
      # -----------------------------------------------------------
      - name: Upload TestNG report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestNG-Report-${{ inputs.env }}-All-Browsers
          path: target/surefire-reports/
          retention-days: 7

      # -----------------------------------------------------------
      # STEP 7 — UPLOAD CHAINTEST REPORT
      # -----------------------------------------------------------
      # ChainTest is configured in chaintest.properties to generate
      # two HTML files inside target/chaintest/:
      #
      #   Index.html → full interactive test report with:
      #     - Test timeline and execution order
      #     - Pass/fail status per test with screenshots
      #     - Dark theme UI (chaintest.generator.simple.dark-theme=true)
      #     - Datetime format: yyyy-MM-dd hh:mm:ss a
      #
      #   Email.html → compact email-friendly summary report
      #     - Suitable for sending test results via email
      #     - Generated by ChainTestEmailGenerator
      #
      # Both files are uploaded together as one artifact ZIP.
      # Open Index.html for the full report after downloading.
      #
      # if: always() → uploads even if tests failed so you
      #   always have the ChainTest report available.
      # -----------------------------------------------------------
      - name: Upload ChainTest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ChainTest-Report-${{ inputs.env }}-All-Browsers
          path: target/chaintest/
          retention-days: 7

      # -----------------------------------------------------------
      # STEP 8 — GENERATE AND UPLOAD ALLURE REPORT
      # -----------------------------------------------------------
      # Allure works in two stages:
      #
      # STAGE 1 — Raw results (generated during test run)
      #   Your allure.properties file sets:
      #     allure.results.directory=target/allure-results
      #   During mvn test, the allure-testng listener writes
      #   one JSON file per test into target/allure-results/.
      #   These are raw data files, not the final HTML report.
      #
      # STAGE 2 — HTML report generation (this step)
      #   The allure-commandline tool reads the raw JSON files
      #   from target/allure-results/ and generates a full
      #   interactive HTML report in target/allure-report/.
      #   The report includes:
      #     - Overview dashboard with pass/fail charts
      #     - Test suites breakdown
      #     - Timeline view showing parallel execution
      #     - Per-test details with steps, screenshots, logs
      #     - Categories for failed/broken/skipped tests
      #
      # allure generate flags:
      #   target/allure-results → input: raw JSON result files
      #   -o target/allure-report → output: final HTML report
      #   --clean → clears output folder before generating
      #             so there are no stale files from old runs
      #
      # Open index.html inside the downloaded ZIP to view
      # the full Allure report in your browser.
      #
      # if: always() → generates and uploads even if tests
      #   failed so you always have the Allure report.
      # -----------------------------------------------------------
      - name: Generate Allure report
        if: always()
        run: |
          mvn allure:report -B

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Allure-Report-${{ inputs.env }}-All-Browsers
          path: target/site/allure-maven-plugin/
          retention-days: 7
