# ============================================================
# Workflow  : Run Tests - Single Browser
# Project   : Framework2026
# Author    : Suyash
# ============================================================
#
# WHAT THIS WORKFLOW DOES:
#   Manually triggered workflow that runs your TestNG test
#   suite on a SINGLE browser of your choice against a
#   chosen environment. After tests finish, generates all
#   3 reports and publishes them to GitHub Pages.
#
# PARALLEL VM MODE (use_matrix = true):
#   Splits your 5 test classes across 2 parallel VMs so
#   tests run simultaneously instead of sequentially.
#
#   VM 1 → LoginPageTest + AccountsPageTest + SearchResultsPageTest
#   VM 2 → ProductInformationPageTest + RegistrationPageTest
#
#   Both VMs run at the same time on separate GitHub machines.
#   This cuts total execution time by roughly 50%.
#   Each VM uploads its own results, which are merged before
#   the final report is generated.
#
# SINGLE VM MODE (use_matrix = false):
#   All test classes run on one VM sequentially.
#   Simpler, easier to debug, slower.
#
# WHEN TO USE EACH MODE:
#   use_matrix = false → debugging a specific failure,
#                        first run to check everything works
#   use_matrix = true  → full regression run, want results fast
#
# PARAMETERS EXPLAINED:
#   env         → which config file to load (default/dev/qa/stage/uat)
#   browser     → which browser to use (chrome/firefox/edge)
#   xml_file    → which TestNG XML suite to run
#   headless    → run without visible browser window (must be true in CI)
#   incognito   → run with no cookies or cache
#   use_matrix  → true = split across parallel VMs, false = single VM
# ============================================================

name: Run Tests - Single Browser

on:
  workflow_dispatch:
    inputs:

      # -----------------------------------------------------------
      # PARAMETER 1 — ENVIRONMENT
      # Tells DriverFactory.initProperties() which config file
      # to load. Maps to System.getProperty("env") in your code.
      # "default" loads default.config.properties (no -Denv flag)
      # -----------------------------------------------------------
      env:
        description: "Environment to run tests on"
        type: choice
        options: [default, dev, qa, stage, uat]
        default: default

      # -----------------------------------------------------------
      # PARAMETER 2 — BROWSER
      # Which browser to launch. Passed as -Dbrowser= to Maven.
      # OptionsFactory reads this to create the correct WebDriver.
      # -----------------------------------------------------------
      browser:
        description: "Browser to run tests on"
        type: choice
        options: [chrome, firefox, edge]
        default: chrome

      # -----------------------------------------------------------
      # PARAMETER 3 — TESTNG XML SUITE
      # Only single-browser XMLs listed here. These do NOT
      # hardcode browser inside them so your dropdown is respected.
      #   parallel   → all test classes run simultaneously (faster)
      #   sequential → test classes run one after another (debuggable)
      # -----------------------------------------------------------
      xml_file:
        description: "TestNG XML suite to run"
        type: choice
        options:
          - testng_all_test_default_parallel.xml
          - testng_all_test_default_sequential.xml
        default: testng_all_test_default_parallel.xml

      # -----------------------------------------------------------
      # PARAMETER 4 — HEADLESS MODE
      # true  → browser runs without a visible window.
      #         REQUIRED on GitHub runners — no display screen.
      # false → full UI browser (only works locally).
      # -----------------------------------------------------------
      headless:
        description: "Run browser in headless mode (must be true in CI)"
        type: boolean
        default: true

      # -----------------------------------------------------------
      # PARAMETER 5 — INCOGNITO MODE
      # true  → fresh browser with no cookies/cache every run.
      # false → browser uses default profile.
      # -----------------------------------------------------------
      incognito:
        description: "Run browser in incognito mode"
        type: boolean
        default: true

      # -----------------------------------------------------------
      # PARAMETER 6 — PARALLEL VM MATRIX
      # false (default) → all tests run on ONE GitHub VM.
      #                   Simpler, easier to debug.
      #
      # true            → test classes are SPLIT across 2 GitHub
      #                   VMs that run simultaneously:
      #
      #   VM 1 (shard-1): LoginPageTest
      #                   AccountsPageTest
      #                   SearchResultsPageTest
      #
      #   VM 2 (shard-2): ProductInformationPageTest
      #                   RegistrationPageTest
      #
      #   Each VM is a completely fresh GitHub Ubuntu machine.
      #   Both start at the same time and run in parallel.
      #   Results from both VMs are merged before report generation.
      #   Expected time saving: ~50% faster than single VM.
      #
      # NOTE: When matrix is enabled, the xml_file dropdown is
      #       ignored. Each shard uses its own targeted XML that
      #       only includes the test classes assigned to that shard.
      # -----------------------------------------------------------
      use_matrix:
        description: "Split tests across parallel VMs for faster execution"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # =================================================================
  # JOB 1A — SINGLE VM TEST RUN
  # =================================================================
  # Runs when use_matrix = false.
  # All test classes run on one VM using the selected XML file.
  # This is the standard mode — simple and easy to debug.
  # =================================================================
  test-single-vm:
    name: "Single VM | ${{ inputs.env }} | ${{ inputs.browser }}"
    if: ${{ inputs.use_matrix == false }}
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      # -----------------------------------------------------------
      # Caches ~/.m2/repository keyed to pom.xml content.
      # First run downloads all deps and saves to cache.
      # All future runs restore from cache — much faster.
      # -----------------------------------------------------------
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Print run configuration
        run: |
          echo "=================================================="
          echo "  MODE         : Single VM"
          echo "  Environment  : ${{ inputs.env }}"
          echo "  Browser      : ${{ inputs.browser }}"
          echo "  XML Suite    : ${{ inputs.xml_file }}"
          echo "  Headless     : ${{ inputs.headless }}"
          echo "  Incognito    : ${{ inputs.incognito }}"
          echo "=================================================="

      # -----------------------------------------------------------
      # continue-on-error: true → workflow continues to report
      # steps even when tests fail. Without this, a single test
      # failure stops the workflow and you get no reports.
      # -----------------------------------------------------------
      - name: Run TestNG suite
        continue-on-error: true
        run: |
          ENV_FLAG=""
          if [ "${{ inputs.env }}" != "default" ]; then
            ENV_FLAG="-Denv=${{ inputs.env }}"
          fi
          mvn clean test $ENV_FLAG \
            -Dbrowser=${{ inputs.browser }} \
            -Dheadless=${{ inputs.headless }} \
            -Dincognito=${{ inputs.incognito }} \
            -Dsurefire.suiteXmlFiles=src/test/resources/testrunners/${{ inputs.xml_file }} \
            -B

      - name: Generate Allure report
        if: always()
        run: mvn allure:report -B

      - name: Prepare and upload GitHub Pages content
        if: always()
        run: |
          mkdir -p reports/testng reports/chaintest reports/allure
          cp -r target/surefire-reports/. reports/testng/ 2>/dev/null || true
          cp -r target/chaintest/. reports/chaintest/ 2>/dev/null || true
          cp -r target/site/allure-maven-plugin/. reports/allure/ 2>/dev/null || true
          cat > reports/index.html << 'EOF'
          <!DOCTYPE html><html><head><title>Framework2026 Reports</title>
          <style>body{font-family:Arial,sans-serif;max-width:600px;margin:60px auto;background:#f5f5f5}
          .card{background:white;border-radius:8px;padding:20px;margin:16px 0;box-shadow:0 2px 6px rgba(0,0,0,.1)}
          a{color:#0066cc;font-size:18px;text-decoration:none;font-weight:bold}
          p{color:#666;margin:6px 0 0;font-size:14px}</style></head><body>
          <h1>Framework2026 — Test Reports</h1>
          <div class="card"><a href="allure/index.html">📊 Allure Report</a><p>Rich dashboard with charts and timeline</p></div>
          <div class="card"><a href="chaintest/Index.html">🔗 ChainTest Report</a><p>Dark theme report with screenshots</p></div>
          <div class="card"><a href="testng/index.html">✅ TestNG Report</a><p>Pass/fail per test with stack traces</p></div>
          </body></html>
          EOF

      - name: Upload to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  # =================================================================
  # JOB 1B — PARALLEL VM MATRIX TEST RUN
  # =================================================================
  # Runs when use_matrix = true.
  #
  # GitHub Actions matrix strategy spins up one fresh VM per entry
  # in the matrix. Both VMs start simultaneously and run in parallel.
  #
  # shard-1 runs: LoginPageTest, AccountsPageTest, SearchResultsPageTest
  # shard-2 runs: ProductInformationPageTest, RegistrationPageTest
  #
  # Each shard uploads its allure-results as an artifact.
  # The merge-and-report job below downloads both artifacts,
  # combines them, and generates one unified report.
  #
  # fail-fast: false → if one shard fails, the other keeps running.
  #   This ensures you always get results from both shards even
  #   if one has failures.
  # =================================================================
  test-matrix:
    name: "Shard ${{ matrix.shard }} | ${{ inputs.env }} | ${{ inputs.browser }}"
    if: ${{ inputs.use_matrix == true }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---------------------------------------------------
          # SHARD 1 — Login + Accounts + Search
          # These 3 classes are grouped together because they
          # are lighter tests and balance well with shard 2.
          # ---------------------------------------------------
          - shard: "1"
            classes: >-
              tests.LoginPageTest,
              tests.AccountsPageTest,
              tests.SearchResultsPageTest

          # ---------------------------------------------------
          # SHARD 2 — ProductInformation + Registration
          # Registration tests use data providers (CSV + Excel)
          # so they take longer — balanced with ProductInfo.
          # ---------------------------------------------------
          - shard: "2"
            classes: >-
              tests.ProductInformationPageTest,
              tests.RegistrationPageTest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Print shard configuration
        run: |
          echo "=================================================="
          echo "  MODE         : Parallel VM Matrix"
          echo "  Shard        : ${{ matrix.shard }} of 2"
          echo "  Environment  : ${{ inputs.env }}"
          echo "  Browser      : ${{ inputs.browser }}"
          echo "  Headless     : ${{ inputs.headless }}"
          echo "  Incognito    : ${{ inputs.incognito }}"
          echo "  Test Classes : ${{ matrix.classes }}"
          echo "=================================================="

      # -----------------------------------------------------------
      # Runs only the test classes assigned to this shard.
      # -Dtest= is a Maven Surefire parameter that accepts a
      # comma-separated list of test class names to run.
      # This overrides the XML file and runs only those classes.
      # -----------------------------------------------------------
      - name: Run assigned test classes
        continue-on-error: true
        run: |
          ENV_FLAG=""
          if [ "${{ inputs.env }}" != "default" ]; then
            ENV_FLAG="-Denv=${{ inputs.env }}"
          fi
          mvn clean test $ENV_FLAG \
            -Dbrowser=${{ inputs.browser }} \
            -Dheadless=${{ inputs.headless }} \
            -Dincognito=${{ inputs.incognito }} \
            -Dtest="${{ matrix.classes }}" \
            -B

      # -----------------------------------------------------------
      # Uploads raw Allure JSON results from this shard.
      # The merge-and-report job downloads results from ALL shards
      # and combines them into one unified Allure report.
      # Named with shard number so artifacts don't overwrite each other.
      # -----------------------------------------------------------
      - name: Upload Allure results for this shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: target/allure-results/
          retention-days: 1

      # -----------------------------------------------------------
      # Uploads surefire reports from this shard separately.
      # -----------------------------------------------------------
      - name: Upload ChainTest results for this shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaintest-results-shard-${{ matrix.shard }}
          path: target/chaintest/
          retention-days: 1

      - name: Upload surefire results for this shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-results-shard-${{ matrix.shard }}
          path: target/surefire-reports/
          retention-days: 1

  # =================================================================
  # JOB 2 — MERGE RESULTS AND GENERATE REPORTS (matrix mode only)
  # =================================================================
  # Runs after ALL matrix shards finish (needs: test-matrix).
  # Downloads allure-results from both shards, merges them into
  # one folder, generates a single unified Allure report that
  # shows results from all test classes together.
  # =================================================================
  merge-and-report:
    name: Merge results and publish reports
    if: ${{ inputs.use_matrix == true }}
    needs: test-matrix
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # -----------------------------------------------------------
      # Downloads allure-results from shard 1 and shard 2.
      # Both are placed into target/allure-results/ so Allure
      # sees all test results as if they ran on one machine.
      # -----------------------------------------------------------
      # -----------------------------------------------------------
      # WHY SEPARATE SUBFOLDERS FOR SUREFIRE:
      # Surefire names XML files after the test class:
      #   TEST-tests.LoginPageTest.xml
      #   TEST-tests.AccountsPageTest.xml
      # If both shards download into the same folder, shard 2
      # overwrites shard 1 files with the same name — you lose
      # 50% of results. That was the bug causing only 25 tests.
      #
      # Allure uses UUID filenames (abc123.json) so it is safe
      # to merge directly into the same folder.
      # -----------------------------------------------------------

      - name: Download Allure results from shard 1
        uses: actions/download-artifact@v4
        with:
          name: allure-results-shard-1
          path: target/allure-results/

      - name: Download Allure results from shard 2
        uses: actions/download-artifact@v4
        with:
          name: allure-results-shard-2
          path: target/allure-results/

      - name: Download ChainTest results from shard 1
        uses: actions/download-artifact@v4
        with:
          name: chaintest-results-shard-1
          path: chaintest-shard-1/

      - name: Download ChainTest results from shard 2
        uses: actions/download-artifact@v4
        with:
          name: chaintest-results-shard-2
          path: chaintest-shard-2/

      - name: Merge ChainTest results from all shards
        run: |
          mkdir -p target/chaintest
          cp -r chaintest-shard-1/. target/chaintest/ 2>/dev/null || true
          cp -r chaintest-shard-2/. target/chaintest/ 2>/dev/null || true

      - name: Download surefire results from shard 1
        uses: actions/download-artifact@v4
        with:
          name: surefire-results-shard-1
          path: surefire-shard-1/

      - name: Download surefire results from shard 2
        uses: actions/download-artifact@v4
        with:
          name: surefire-results-shard-2
          path: surefire-shard-2/

      - name: Merge surefire results from all shards
        run: |
          mkdir -p target/surefire-reports
          cp -r surefire-shard-1/. target/surefire-reports/
          cp -r surefire-shard-2/. target/surefire-reports/
          echo "Total surefire XML files after merge:"
          ls target/surefire-reports/*.xml 2>/dev/null | wc -l

      # -----------------------------------------------------------
      # Generates the unified Allure HTML report from the merged
      # allure-results folder containing data from both shards.
      # -----------------------------------------------------------
      - name: Generate merged Allure report
        if: always()
        run: mvn allure:report -B

      - name: Prepare and upload GitHub Pages content
        if: always()
        run: |
          mkdir -p reports/testng reports/chaintest reports/allure
          cp -r target/surefire-reports/. reports/testng/ 2>/dev/null || true
          cp -r target/chaintest/. reports/chaintest/ 2>/dev/null || true
          cp -r target/site/allure-maven-plugin/. reports/allure/ 2>/dev/null || true
          cat > reports/index.html << 'EOF'
          <!DOCTYPE html><html><head><title>Framework2026 Reports</title>
          <style>body{font-family:Arial,sans-serif;max-width:600px;margin:60px auto;background:#f5f5f5}
          .card{background:white;border-radius:8px;padding:20px;margin:16px 0;box-shadow:0 2px 6px rgba(0,0,0,.1)}
          a{color:#0066cc;font-size:18px;text-decoration:none;font-weight:bold}
          p{color:#666;margin:6px 0 0;font-size:14px}</style></head><body>
          <h1>Framework2026 — Test Reports (Merged from 2 VMs)</h1>
          <div class="card"><a href="allure/index.html">📊 Allure Report</a><p>Merged results from all parallel VMs</p></div>
          <div class="card"><a href="chaintest/Index.html">🔗 ChainTest Report</a><p>Dark theme report with screenshots</p></div>
          <div class="card"><a href="testng/index.html">✅ TestNG Report</a><p>Pass/fail per test with stack traces</p></div>
          </body></html>
          EOF

      - name: Upload to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  # =================================================================
  # JOB 3 — DEPLOY TO GITHUB PAGES
  # =================================================================
  # Waits for whichever test job ran (single VM or matrix merge)
  # then deploys the uploaded artifact to GitHub Pages.
  # =================================================================
  deploy:
    name: Publish reports to GitHub Pages
    needs: [test-single-vm, merge-and-report]
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
