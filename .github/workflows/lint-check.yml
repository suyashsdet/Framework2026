# ============================================================
# Workflow  : Lint Check - Line Length
# Project   : Framework2026
# Author    : Suyash
# ============================================================
#
# WHAT THIS WORKFLOW DOES:
#   Scans every Java source file (.java) in the project and
#   checks that no single line exceeds 120 characters.
#
# WHY 120 CHARACTERS?
#   - Keeps code readable in split-screen editors (IntelliJ,
#     VS Code) without horizontal scrolling.
#   - Makes code review easier in GitHub PR diff view.
#   - Follows widely accepted Java coding standards.
#
# WHAT IT CHECKS:
#   - All *.java files inside src/
#   - Skips generated/compiled files in target/
#   - Skips version control metadata in .git/
#
# WHAT HAPPENS WHEN IT FAILS:
#   - The exact FILE NAME is printed in the log
#   - The exact LINE NUMBER is printed in the log
#   - The actual CHARACTER COUNT is shown so you know how
#     many characters to reduce
#   - A GitHub inline annotation appears directly on the
#     offending line in the PR diff view (red marker)
#   - The job exits with code 1 → PR is blocked (red X)
#   - ALL violations are reported at once, not just the first
#     one, so you can fix everything in a single pass
#
# WHAT HAPPENS WHEN IT PASSES:
#   - A success summary is printed listing how many files
#     were scanned and confirming zero violations
#   - The job exits with code 0 → PR check goes green (PASS)
#
# WHEN DOES IT RUN?
#   - On every git push to any branch
#   - On every pull request opened or updated on any branch
#
# HOW TO FIX A VIOLATION:
#   1. Look at the log output: it tells you FILE + LINE + CHARS
#   2. Open that file in IntelliJ
#   3. Break the long line using one of these techniques:
#      - Split method parameters across multiple lines
#      - Extract a long expression into a named variable
#      - Break a method chain at the dot (.) onto the next line
#   4. Push again — the workflow will re-run automatically
# ============================================================

name: Lint Check - Line Length

# -----------------------------------------------------------------
# TRIGGERS
# This workflow runs automatically in two situations:
#
#   push:
#     Fires whenever you run "git push" to any branch.
#     Catches lint issues immediately after every commit.
#
#   pull_request:
#     Fires whenever a PR is opened, updated, or a new commit
#     is pushed to an open PR. Blocks merging if lint fails.
#
#   "**" means ALL branches are covered — main, dev, feature
#   branches, hotfix branches, everything.
# -----------------------------------------------------------------
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint:
    name: Java Line-Length Lint (max 120 chars)

    # ubuntu-latest = a fresh GitHub-hosted Linux virtual machine.
    # It is spun up just for this job and discarded after it finishes.
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------
      # STEP 1 — CHECKOUT
      # -----------------------------------------------------------
      # The runner (Linux VM) starts with an empty workspace.
      # This step uses the official GitHub "checkout" action to
      # clone your repository onto the runner so the next step
      # can actually read your Java files.
      # "v4" is the latest stable version of the checkout action.
      # -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # STEP 2 — LINE LENGTH SCAN
      # -----------------------------------------------------------
      # This is the core lint step. Here is exactly what it does:
      #
      # 1. FIND all .java files:
      #    Uses the "find" command to locate every *.java file
      #    recursively under the project root.
      #    Excludes:
      #      .git/    → version control internals, not your code
      #      target/  → Maven compiled output, not your source
      #
      # 2. READ each file line by line:
      #    "IFS= read -r" reads each line exactly as written,
      #    preserving all spaces and tab characters so the
      #    character count is accurate.
      #    "|| [ -n "$line" ]" ensures the last line is checked
      #    even if the file does not end with a newline character.
      #
      # 3. MEASURE each line:
      #    "${#line}" is a bash expression that returns the number
      #    of characters in the variable $line.
      #    If that count is greater than 120, it is a violation.
      #
      # 4. REPORT violations with full context:
      #    Each violation prints three things to the log:
      #      - FILE PATH  : exactly which file has the problem
      #      - LINE NUMBER: exactly which line to go fix
      #      - CHAR COUNT : how many characters the line has
      #                     (so you know how much to shorten it)
      #    It also emits a "::error" GitHub annotation which
      #    places a red marker directly on that line in the
      #    PR diff view — no need to hunt through the log.
      #
      # 5. COLLECT all violations before failing:
      #    FAILED=1 is set on each violation but the script does
      #    NOT exit immediately. It finishes scanning every file
      #    first. This means you get the complete list of all
      #    violations in one run instead of fixing one at a time.
      #
      # 6. PRINT a summary:
      #    After scanning, prints either:
      #      with the total violation count → job fails
      #      with the total files scanned  → job passes
      # -----------------------------------------------------------
      - name: Check line length (max 120 characters)
        run: |
          FAILED=0
          VIOLATION_COUNT=0
          FILE_COUNT=0

          echo "----------------------------------------------------"
          echo "  Scanning all .java files for lines > 120 chars..."
          echo "----------------------------------------------------"

          while IFS= read -r file; do
            FILE_COUNT=$((FILE_COUNT + 1))
            LINE_NUM=0
            while IFS= read -r line || [ -n "$line" ]; do
              LINE_NUM=$((LINE_NUM + 1))
              if [ ${#line} -gt 120 ]; then
                VIOLATION_COUNT=$((VIOLATION_COUNT + 1))
                echo "::error file=$file,line=$LINE_NUM::Line exceeds 120 characters (${#line} chars)"
                echo "  FILE : $file"
                echo "     LINE : $LINE_NUM"
                echo "     CHARS: ${#line} (exceeds limit by $((${#line} - 120)) characters)"
                echo ""
              fi
            done < "$file"
          done < <(find . -type f -name "*.java" \
            ! -path "./.git/*" \
            ! -path "./target/*")

          echo "----------------------------------------------------"
          if [ $FAILED -ne 0 ] || [ $VIOLATION_COUNT -gt 0 ]; then
            echo "  LINT FAILED"
            echo "  Total files scanned : $FILE_COUNT"
            echo "  Total violations    : $VIOLATION_COUNT"
            echo ""
            echo "  HOW TO FIX:"
            echo "  Look at each FILE + LINE listed above."
            echo "  Break the long line by splitting method params,"
            echo "  extracting variables, or wrapping method chains."
            echo "  Then push again — this check will re-run."
            echo "----------------------------------------------------"
            exit 1
          fi

          echo "  LINT PASSED"
          echo "  Total files scanned : $FILE_COUNT"
          echo "  Total violations    : 0"
          echo "  All lines are within the 120 character limit."
          echo "----------------------------------------------------"
