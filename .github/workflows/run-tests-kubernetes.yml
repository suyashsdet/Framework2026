              .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 40px; }
              .section { margin-bottom: 40px; }
              h2 { font-size: 18px; color: #f0f6fc; margin-bottom: 16px; border-left: 4px solid #58a6ff; padding-left: 12px; }
              .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
              .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 24px; text-align: center; }
              .card .browser { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
              .card .value { font-size: 48px; font-weight: bold; color: #58a6ff; }
              .card .label { font-size: 13px; color: #8b949e; margin-top: 6px; }
              .card.green .value { color: #3fb950; }
              .card.yellow .value { color: #d29922; }
              .flow { display: flex; align-items: center; justify-content: center; gap: 16px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 30px; margin-bottom: 16px; }
              .flow-box { text-align: center; }
              .flow-box .num { font-size: 42px; font-weight: bold; }
              .flow-box .txt { font-size: 12px; color: #8b949e; margin-top: 4px; }
              .flow-arrow { font-size: 28px; color: #3fb950; }
