              .info-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
              .info-card .key { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
              .info-card .val { font-size: 15px; color: #e6edf3; font-weight: 500; }
              pre { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; font-size: 13px; color: #8b949e; overflow-x: auto; white-space: pre-wrap; }
              .back { display: inline-block; margin-bottom: 30px; color: #58a6ff; text-decoration: none; font-size: 14px; }
              .back:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <a href="index.html" class="back">← Back to Reports</a>
            <h1>⚡ Kubernetes Scaling Summary</h1>
            <p class="subtitle">Framework2026 · Selenium Grid on Kubernetes · $RUN_TIME</p>

            <div class="section">
              <h2>Scaling Flow — Pods per Browser</h2>
              <div class="flow">
                <div class="flow-box before">
                  <div class="num">2</div>
                  <div class="txt">Pods BEFORE tests</div>
                  <div class="txt">2 slots available</div>
                </div>
                <div class="flow-arrow">→</div>
                <div class="flow-box">
                  <div class="num" style="color:#d29922">5</div>
                  <div class="txt">Threads needed</div>
                  <div class="txt">Memory spikes above 80%</div>
                </div>
                <div class="flow-arrow">→</div>
