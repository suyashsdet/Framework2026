name: Run Tests - Kubernetes (Selenium Grid)

# ============================================================
# WHAT THIS WORKFLOW DOES:
#   Spins up a real Kubernetes cluster on the GitHub runner
#   using "kind" (Kubernetes IN Docker), deploys a full
#   Selenium Grid (Hub + Chrome/Firefox/Edge nodes) as k8s
#   Deployments and Services, then runs the TestNG suite
#   against the Grid via RemoteWebDriver.
#
# WHY KUBERNETES INSTEAD OF PLAIN DOCKER:
#   - Docker Compose runs containers on ONE machine
#   - Kubernetes orchestrates containers across MANY nodes
#   - k8s gives you: auto-healing, scaling, rolling updates
#   - replicas: 1 per browser at start, HPA scales up to 5
#     during tests, each handling 1 session
#   - If a browser pod crashes, k8s restarts it automatically
#   - This is how real enterprise Selenium Grids are run
#
# HOW IT WORKS:
#   1. kind creates a local k8s cluster inside Docker on the runner
#   2. kubectl applies all 4 manifests from the k8s/ folder:
#        selenium-hub.yaml     → Hub Deployment + NodePort Service
#        selenium-chrome.yaml  → 1 Chrome node pod (HPA scales to 5)
#        selenium-firefox.yaml → 1 Firefox node pod (HPA scales to 5)
#        selenium-edge.yaml    → 1 Edge node pod (HPA scales to 5)
#   3. Workflow waits for all pods to reach Running state
#   4. kubectl port-forward exposes Hub port 4444 to localhost
#   5. Maven runs tests with -DSELENIUM_REMOTE_URL pointing
#      at the Hub — DriverFactory creates RemoteWebDriver
#   6. kind cluster is deleted after tests finish
# ============================================================

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to run tests on"
        type: choice
        options:
          - default
          - dev
          - qa
          - stage
          - uat
        default: default

      xml_file:
        description: "TestNG XML suite to run"
        type: choice
        options:
          - testng_all_test_default_parallel_multi_browser.xml
          - testng_all_test_default_sequential_multi_browser.xml
        default: testng_all_test_default_parallel_multi_browser.xml

      incognito:
        description: "Run browsers in incognito mode"
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: >
      Tests (Kubernetes) | ENV=${{ inputs.env }} | ${{ inputs.xml_file }}
    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------------------
      # STEP 1 - CHECKOUT
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # STEP 2 - SET UP JAVA 24
      # --------------------------------------------------------
      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      # --------------------------------------------------------
      # STEP 3 - CACHE MAVEN DEPENDENCIES
      # --------------------------------------------------------
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # --------------------------------------------------------
      # STEP 4 - INSTALL KIND (Kubernetes IN Docker)
      # --------------------------------------------------------
      # kind lets you run a full Kubernetes cluster locally
      # using Docker containers as the cluster nodes.
      # Every GitHub ubuntu-latest runner has Docker pre-installed
      # so kind works out of the box — no VM or cloud needed.
      # --------------------------------------------------------
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      # --------------------------------------------------------
      # STEP 5 - CREATE KUBERNETES CLUSTER
      # --------------------------------------------------------
      # Creates a single-node k8s cluster named "selenium-grid".
      # kind spins this up as a Docker container acting as both
      # the control plane and worker node.
      # --------------------------------------------------------
      - name: Create Kubernetes cluster with kind
        run: |
          kind create cluster --name selenium-grid --wait 60s
          kubectl cluster-info --context kind-selenium-grid
          kubectl get nodes

      # --------------------------------------------------------
      # STEP 6 - DEPLOY SELENIUM GRID TO KUBERNETES
      # --------------------------------------------------------
      # Applies all 4 manifests from the k8s/ folder:
      #   selenium-hub.yaml     → Hub pod + NodePort Service
      #   selenium-chrome.yaml  → 1 Chrome node pod (HPA scales to 5)
      #   selenium-firefox.yaml → 1 Firefox node pod (HPA scales to 5)
      #   selenium-edge.yaml    → 1 Edge node pod (HPA scales to 5)
      #
      # kubectl apply is idempotent — safe to run multiple times.
      # --------------------------------------------------------
      - name: Deploy Selenium Grid to Kubernetes
        run: |
          kubectl create namespace selenium-grid --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/selenium-hub.yaml
          kubectl apply -f k8s/selenium-chrome.yaml
          kubectl apply -f k8s/selenium-firefox.yaml
          kubectl apply -f k8s/selenium-edge.yaml
          kubectl apply -f k8s/hpa-chrome.yaml
          kubectl apply -f k8s/hpa-firefox.yaml
          kubectl apply -f k8s/hpa-edge.yaml
          echo "All manifests applied. Listing all pods:"
          kubectl get pods -n selenium-grid -o wide

      # --------------------------------------------------------
      # STEP 6b - DEPLOY PROMETHEUS + GRAFANA
      # --------------------------------------------------------
      # Deploys monitoring stack into the monitoring namespace.
      # Prometheus scrapes HPA and pod metrics every 15s.
      # Grafana visualizes scaling timeline as a dashboard.
      # kube-state-metrics provides HPA replica count metrics.
      # --------------------------------------------------------
      - name: Deploy Prometheus and Grafana monitoring
        run: |
          kubectl apply -f k8s/monitoring/prometheus.yaml
          sleep 3
          kubectl apply -f k8s/monitoring/prometheus-config.yaml
          kubectl apply -f k8s/monitoring/grafana.yaml
          echo "Waiting for Prometheus..."
          kubectl rollout status deployment/prometheus -n monitoring --timeout=60s
          echo "Waiting for Grafana..."
          kubectl rollout status deployment/grafana -n monitoring --timeout=60s
          echo "Monitoring stack ready"

      # --------------------------------------------------------
      # STEP 6b - INSTALL METRICS SERVER
      # --------------------------------------------------------
      # HPA needs metrics-server to read CPU usage per pod.
      # --kubelet-insecure-tls is required for kind clusters
      # because kind uses self-signed certificates.
      # --------------------------------------------------------
      - name: Install metrics-server for HPA
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch deployment metrics-server -n kube-system \
            --type='json' \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl rollout status deployment/metrics-server -n kube-system --timeout=120s
          echo "Metrics server ready"
      # kubectl rollout status blocks until the Deployment
      # reports all replicas are Running and Ready.
      # --timeout=120s means if pods are not ready in 2 minutes,
      # the step fails with a clear error message.
      # --------------------------------------------------------
      - name: Wait for all Selenium pods to be ready
        run: |
          echo "Waiting for Hub..."
          kubectl rollout status deployment/grid-hub -n selenium-grid --timeout=120s

          echo "Waiting for Chrome nodes..."
          kubectl rollout status deployment/grid-node-chrome -n selenium-grid --timeout=120s

          echo "Waiting for Firefox nodes..."
          kubectl rollout status deployment/grid-node-firefox -n selenium-grid --timeout=120s

          echo "Waiting for Edge nodes..."
          kubectl rollout status deployment/grid-node-edge -n selenium-grid --timeout=120s

          echo "All pods are ready:"
          kubectl get pods -n selenium-grid -o wide

      # --------------------------------------------------------
      # STEP 8 - PORT FORWARD HUB TO LOCALHOST
      # --------------------------------------------------------
      # The Hub Service is NodePort 30444 inside the cluster.
      # kubectl port-forward maps it to localhost:4444 on the
      # runner so Maven can reach it at http://localhost:4444.
      # Running in background (&) so the step does not block.
      # --------------------------------------------------------
      - name: Port-forward Selenium Hub to localhost:4444
        run: |
          kubectl port-forward service/grid-hub 4444:4444 -n selenium-grid &
          kubectl port-forward service/prometheus 9090:9090 -n monitoring &
          kubectl port-forward service/grafana 3000:3000 -n monitoring &
          sleep 5
          echo "Prometheus status:"
          curl -s http://localhost:9090/-/ready || true
          echo "Grafana status:"
          curl -s http://localhost:3000/api/health || true

      # --------------------------------------------------------
      # STEP 8b - WAIT FOR ALL BROWSER NODES TO REGISTER
      # --------------------------------------------------------
      # WHY THIS STEP EXISTS:
      #   kubectl rollout status only confirms pods are Running.
      #   It does NOT mean the browser node has connected to the
      #   Hub yet — that registration happens after the pod starts
      #   and can take 10-30 extra seconds.
      #
      #   Without this wait, Maven fires immediately, @BeforeClass
      #   gets a session queued on an unregistered node, the Hub
      #   times out allocating it, the page never loads, and
      #   @BeforeClass throws TimeoutException → all @Test methods
      #   in that class are skipped by TestNG.
      #
      #   This loop polls /wd/hub/status every 5 seconds until
      #   Chrome, Firefox AND Edge each have at least 1 node
      #   registered with the Hub before Maven is allowed to start.
      # --------------------------------------------------------
      - name: Wait for all browser nodes to register with Hub
        run: |
          echo "Waiting for Chrome, Firefox and Edge nodes to register with Hub..."
          for i in {1..60}; do
            STATUS=$(curl -s http://localhost:4444/wd/hub/status 2>/dev/null || echo '{}')
            CHROME=$(echo "$STATUS" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    nodes = d['value']['nodes']
    print(sum(1 for n in nodes if any(s['stereotype'].get('browserName','').lower() == 'chrome' for s in n['slots'])))
except:
    print(0)
" 2>/dev/null || echo 0)
            FIREFOX=$(echo "$STATUS" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    nodes = d['value']['nodes']
    print(sum(1 for n in nodes if any(s['stereotype'].get('browserName','').lower() == 'firefox' for s in n['slots'])))
except:
    print(0)
" 2>/dev/null || echo 0)
            EDGE=$(echo "$STATUS" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    nodes = d['value']['nodes']
    print(sum(1 for n in nodes if any(s['stereotype'].get('browserName','').lower() == 'microsoftedge' for s in n['slots'])))
except:
    print(0)
" 2>/dev/null || echo 0)
            echo "Attempt $i — Chrome nodes: $CHROME | Firefox nodes: $FIREFOX | Edge nodes: $EDGE"
            if [ "$CHROME" -ge 1 ] && [ "$FIREFOX" -ge 1 ] && [ "$EDGE" -ge 1 ]; then
              echo "All 3 browser types registered. Grid is ready!"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Grid not ready after 5 minutes. Dumping Hub status:"
              curl -s http://localhost:4444/wd/hub/status | python3 -m json.tool || true
              exit 1
            fi
            sleep 5
          done
          echo "Hub status:"
          curl -s http://localhost:4444/wd/hub/status | python3 -m json.tool || true

      # --------------------------------------------------------
      # STEP 9 - PRINT RUN CONFIGURATION
      # --------------------------------------------------------
      - name: Print run configuration
        run: |
          echo "=================================================="
          echo "  TEST RUN CONFIGURATION (Kubernetes Mode)"
          echo "=================================================="
          echo "  Environment   : ${{ inputs.env }}"
          echo "  Browsers      : Chrome + Firefox + Edge"
          echo "  XML Suite     : ${{ inputs.xml_file }}"
          echo "  Headless      : true (always in k8s pods)"
          echo "  Incognito     : ${{ inputs.incognito }}"
          echo "  Hub URL       : http://localhost:4444/wd/hub"
          echo "  Chrome pods   : starts at 1, HPA scales up to 5 on CPU"
          echo "  Firefox pods  : starts at 1, HPA scales up to 5 on CPU"
          echo "  Edge pods     : starts at 1, HPA scales up to 5 on CPU"
          echo "=================================================="
          echo "  BEFORE TESTS - Pod count:"
          kubectl get pods -n selenium-grid
          echo "  BEFORE TESTS - HPA state:"
          kubectl get hpa -n selenium-grid

      # --------------------------------------------------------
      # STEP 10 - RUN TESTS
      # --------------------------------------------------------
      # Single SELENIUM_REMOTE_URL points at the Hub.
      # The Hub routes each session to the correct browser node
      # based on the browser capability requested by DriverFactory.
      # -Dheadless=true is mandatory — k8s pods have no display.
      # --------------------------------------------------------
      - name: Run TestNG suite against Kubernetes Selenium Grid
        continue-on-error: true
        run: |
          ENV_FLAG=""
          if [ "${{ inputs.env }}" != "default" ]; then
            ENV_FLAG="-Denv=${{ inputs.env }}"
          fi

          # Start background HPA sampler - captures peak scaling every 15s
          (
            echo "time,chrome_replicas,firefox_replicas,edge_replicas,chrome_cpu,firefox_cpu,edge_cpu" > /tmp/hpa_samples.csv
            while true; do
              TS=$(date '+%H:%M:%S')
              CR=$(kubectl get hpa hpa-grid-node-chrome -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo 0)
              FR=$(kubectl get hpa hpa-grid-node-firefox -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo 0)
              ER=$(kubectl get hpa hpa-grid-node-edge -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo 0)
              CC=$(kubectl get hpa hpa-grid-node-chrome -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo 0)
              FC=$(kubectl get hpa hpa-grid-node-firefox -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo 0)
              EC=$(kubectl get hpa hpa-grid-node-edge -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo 0)
              echo "$TS,$CR,$FR,$ER,$CC,$FC,$EC" >> /tmp/hpa_samples.csv
              sleep 15
            done
          ) &
          SAMPLER_PID=$!

          mvn clean test $ENV_FLAG \
            -Dheadless=true \
            -Dincognito=${{ inputs.incognito }} \
            -DSELENIUM_REMOTE_URL=http://localhost:4444/wd/hub \
            -Dsurefire.suiteXmlFiles=src/test/resources/testrunners/${{ inputs.xml_file }} \
            -B

          # Stop sampler
          kill $SAMPLER_PID 2>/dev/null || true
          echo "=== HPA Samples during test run ==="
          cat /tmp/hpa_samples.csv

      # --------------------------------------------------------
      # STEP 11 - PRINT POD LOGS ON FAILURE (DEBUG)
      # --------------------------------------------------------
      # If tests fail, print Hub logs so you can see what
      # happened inside the cluster without SSH access.
      # --------------------------------------------------------
      - name: Print Selenium Hub logs
        if: always()
        run: |
          echo "=== AFTER TESTS - Pod count ==="
          kubectl get pods -n selenium-grid -o wide || true
          echo "=== AFTER TESTS - HPA state (shows if scaling happened) ==="
          kubectl get hpa -n selenium-grid || true
          echo "=== ALL PODS ALL NAMESPACES ==="
          kubectl get pods -A || true
          echo "=== Prometheus Targets ==="
          curl -s http://localhost:9090/api/v1/targets | python3 -c "import sys,json; d=json.load(sys.stdin); [print(t['labels'].get('job','?'), '-', t['health'], '-', t['lastError']) for t in d['data']['activeTargets']]" || true
          echo "=== Prometheus available metrics sample ==="
          curl -s "http://localhost:9090/api/v1/label/__name__/values" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(m) for m in d['data'] if 'hpa' in m or 'kube_horizontal' in m]" || true
          echo "=== Selenium Hub Logs ==="
          kubectl logs deployment/grid-hub -n selenium-grid --tail=50 || true

      - name: Capture Grafana dashboard screenshots
        if: always()
        run: |
          mkdir -p reports/grafana
          sleep 10
          curl -s "http://admin:framework2026@localhost:3000/render/d-solo/selenium-grid/selenium-grid-kubernetes-scaling?orgId=1&panelId=1&width=800&height=400&from=now-1h&to=now" \
            -o reports/grafana/pod-count.png 2>/dev/null || echo "Panel 1 render failed"
          curl -s "http://admin:framework2026@localhost:3000/render/d-solo/selenium-grid/selenium-grid-kubernetes-scaling?orgId=1&panelId=2&width=800&height=400&from=now-1h&to=now" \
            -o reports/grafana/hpa-desired.png 2>/dev/null || echo "Panel 2 render failed"
          curl -s "http://admin:framework2026@localhost:3000/render/d-solo/selenium-grid/selenium-grid-kubernetes-scaling?orgId=1&panelId=3&width=800&height=400&from=now-1h&to=now" \
            -o reports/grafana/hpa-current-vs-desired.png 2>/dev/null || echo "Panel 3 render failed"
          echo "Grafana screenshots captured"
          ls -la reports/grafana/ || true

      # --------------------------------------------------------
      # STEP 12 - GENERATE ALLURE REPORT
      # --------------------------------------------------------
      - name: Generate Allure report
        if: always()
        run: mvn allure:report -B

      # --------------------------------------------------------
      # STEP 13 - PREPARE GITHUB PAGES CONTENT
      # --------------------------------------------------------
      - name: Prepare GitHub Pages content
        if: always()
        run: |
          mkdir -p reports/testng reports/chaintest reports/allure

          cp -r target/surefire-reports/. reports/testng/ 2>/dev/null || echo "No TestNG report"
          cp -r target/chaintest/. reports/chaintest/ 2>/dev/null || echo "No ChainTest report"
          cp -r target/site/allure-maven-plugin/. reports/allure/ 2>/dev/null || echo "No Allure report"

          # Capture live kubectl data for scaling summary page
          PODS_AFTER=$(kubectl get pods -n selenium-grid --no-headers 2>/dev/null || echo "cluster deleted")
          HPA_AFTER=$(kubectl get hpa -n selenium-grid --no-headers 2>/dev/null || echo "cluster deleted")

          CHROME_REPLICAS=$(kubectl get hpa hpa-grid-node-chrome -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "N/A")
          FIREFOX_REPLICAS=$(kubectl get hpa hpa-grid-node-firefox -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "N/A")
          EDGE_REPLICAS=$(kubectl get hpa hpa-grid-node-edge -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "N/A")

          CHROME_CPU=$(kubectl get hpa hpa-grid-node-chrome -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo "N/A")
          FIREFOX_CPU=$(kubectl get hpa hpa-grid-node-firefox -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo "N/A")
          EDGE_CPU=$(kubectl get hpa hpa-grid-node-edge -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo "N/A")

          RUN_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')

          # Wait for Prometheus to scrape metrics
          echo "Waiting 30s for Prometheus to scrape metrics..."
          sleep 30

          # Get HPA data directly from kubectl (reliable)
          PROM_HPA_CHROME=$(kubectl get hpa hpa-grid-node-chrome -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "N/A")
          PROM_HPA_FIREFOX=$(kubectl get hpa hpa-grid-node-firefox -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "N/A")
          PROM_HPA_EDGE=$(kubectl get hpa hpa-grid-node-edge -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "N/A")

          # Get CPU utilization from HPA status
          CHROME_HPA_CPU=$(kubectl get hpa hpa-grid-node-chrome -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo "N/A")
          FIREFOX_HPA_CPU=$(kubectl get hpa hpa-grid-node-firefox -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo "N/A")
          EDGE_HPA_CPU=$(kubectl get hpa hpa-grid-node-edge -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo "N/A")

          # Get Prometheus targets status
          PROM_TARGETS=$(curl -s http://localhost:9090/api/v1/targets 2>/dev/null || echo '{}')
          PROM_UP=$(curl -s "http://localhost:9090/api/v1/query?query=up" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(r['metric'].get('job','?'), '=', r['value'][1]) for r in d.get('data',{}).get('result',[])]" 2>/dev/null || echo "N/A")

          # Read HPA samples captured during test run
          SAMPLES=$(cat /tmp/hpa_samples.csv 2>/dev/null || echo "time,chrome_replicas,firefox_replicas,edge_replicas,chrome_cpu,firefox_cpu,edge_cpu")

          # Extract peak values from samples
          PEAK_CHROME=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f2 | sort -n | tail -1 || echo "N/A")
          PEAK_FIREFOX=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f3 | sort -n | tail -1 || echo "N/A")
          PEAK_EDGE=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f4 | sort -n | tail -1 || echo "N/A")
          PEAK_CHROME_CPU=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f5 | sort -n | tail -1 || echo "N/A")
          PEAK_FIREFOX_CPU=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f6 | sort -n | tail -1 || echo "N/A")
          PEAK_EDGE_CPU=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f7 | sort -n | tail -1 || echo "N/A")

          # Build Chart.js timeline data from samples
          TIMELINE_LABELS=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f1 | python3 -c "import sys; data=sys.stdin.read().strip().split('\n'); print(','.join(['\"'+x+'\"' for x in data]))" || echo '"start"')
          CHROME_DATA=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f2 | tr '\n' ',' | sed 's/,$//' || echo "1")
          FIREFOX_DATA=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f3 | tr '\n' ',' | sed 's/,$//' || echo "1")
          EDGE_DATA=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f4 | tr '\n' ',' | sed 's/,$//' || echo "1")
          CHROME_CPU_DATA=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f5 | tr '\n' ',' | sed 's/,$//' || echo "0")
          FIREFOX_CPU_DATA=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f6 | tr '\n' ',' | sed 's/,$//' || echo "0")
          EDGE_CPU_DATA=$(tail -n +2 /tmp/hpa_samples.csv 2>/dev/null | cut -d',' -f7 | tr '\n' ',' | sed 's/,$//' || echo "0")

          # Current values after tests — starts at 1 (replicas: 1 in deployment)
          BEFORE_CHROME=1
          BEFORE_FIREFOX=1
          BEFORE_EDGE=1
          AFTER_CHROME=${PROM_HPA_CHROME}
          AFTER_FIREFOX=${PROM_HPA_FIREFOX}
          AFTER_EDGE=${PROM_HPA_EDGE}
          CHROME_CPU_VAL=${CHROME_HPA_CPU:-0}
          FIREFOX_CPU_VAL=${FIREFOX_HPA_CPU:-0}
          EDGE_CPU_VAL=${EDGE_HPA_CPU:-0}

          cat > reports/prometheus.html << PROMEOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Prometheus Metrics - Framework2026</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #e6edf3; padding: 40px 20px; }
              h1 { font-size: 28px; color: #e6522c; margin-bottom: 6px; }
              .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 40px; }
              .section { margin-bottom: 40px; }
              h2 { font-size: 18px; color: #f0f6fc; margin-bottom: 16px; border-left: 4px solid #e6522c; padding-left: 12px; }
              .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
              .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 24px; text-align: center; }
              .card .label { font-size: 13px; color: #8b949e; margin-bottom: 8px; }
              .card .value { font-size: 48px; font-weight: bold; color: #e6522c; }
              .card .sub { font-size: 12px; color: #8b949e; margin-top: 6px; }
              .query-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 12px; }
              .query-box .query { font-family: monospace; font-size: 13px; color: #79c0ff; margin-bottom: 8px; }
              .query-box .desc { font-size: 13px; color: #8b949e; }
              .back { display: inline-block; margin-bottom: 30px; color: #e6522c; text-decoration: none; font-size: 14px; }
              .back:hover { text-decoration: underline; }
              .grafana-note { background: #161b22; border: 1px solid #f0883e; border-radius: 10px; padding: 24px; margin-bottom: 24px; }
              .grafana-note h3 { color: #f0883e; margin-bottom: 8px; }
              .grafana-note p { color: #8b949e; font-size: 14px; line-height: 1.6; }
            </style>
          </head>
          <body>
            <a href="index.html" class="back">← Back to Reports</a>
            <h1>🔥 Prometheus Metrics</h1>
            <p class="subtitle">Framework2026 · Selenium Grid on Kubernetes · $RUN_TIME</p>

            <div class="section">
              <div class="grafana-note">
                <h3>📊 About This Page</h3>
                <p>Prometheus was deployed inside the Kubernetes cluster during this test run.
                It scraped HPA and pod metrics every 15 seconds.
                The values below were captured via Prometheus API after tests completed.
                In a production setup, Grafana would show these as live time-series graphs
                with the full scaling timeline from 1 pod → 5 pods → back to 1 pod.</p>
              </div>
            </div>

            <div class="section">
              <h2>HPA Current Replicas (from Prometheus)</h2>
              <div class="grid3">
                <div class="card">
                  <div class="label">🟢 Chrome Replicas</div>
                  <div class="value">${PROM_HPA_CHROME}</div>
                  <div class="sub">CPU: ${CHROME_HPA_CPU}% / 80% threshold</div>
                </div>
                <div class="card">
                  <div class="label">🦊 Firefox Replicas</div>
                  <div class="value">${PROM_HPA_FIREFOX}</div>
                  <div class="sub">CPU: ${FIREFOX_HPA_CPU}% / 80% threshold</div>
                </div>
                <div class="card">
                  <div class="label">🔵 Edge Replicas</div>
                  <div class="value">${PROM_HPA_EDGE}</div>
                  <div class="sub">CPU: ${EDGE_HPA_CPU}% / 80% threshold</div>
                </div>
              </div>
            </div>

            <div class="section">
              <h2>Prometheus Queries Used</h2>
              <div class="query-box">
                <div class="query">kube_horizontalpodautoscaler_status_current_replicas{namespace="selenium-grid"}</div>
                <div class="desc">Current replica count per HPA — shows scaling in action</div>
              </div>
              <div class="query-box">
                <div class="query">kube_horizontalpodautoscaler_status_desired_replicas{namespace="selenium-grid"}</div>
                <div class="desc">Desired replica count — what HPA wants vs what exists</div>
              </div>
              <div class="query-box">
                <div class="query">kube_pod_status_phase{namespace="selenium-grid", phase="Running"}</div>
                <div class="desc">Count of running pods — total grid capacity at any moment</div>
              </div>
              <div class="query-box">
                <div class="query">container_cpu_usage_seconds_total{namespace="selenium-grid"}</div>
                <div class="desc">CPU usage per pod — shows spike that triggered HPA scaling</div>
              </div>
            </div>

            <div class="section">
              <h2>📈 Scaling Charts (Chart.js)</h2>
              <div class="grafana-note">
                <h3>Real Data from kubectl + Prometheus</h3>
                <p>These charts are generated from live kubectl HPA data captured during and after the test run. They show exactly what happened to pod counts and CPU during scaling.</p>
              </div>

              <div style="background:#161b22; border:1px solid #30363d; border-radius:10px; padding:24px; margin-bottom:16px">
                <h3 style="color:#f0f6fc; font-size:15px; margin-bottom:16px">📈 Pod Replicas Timeline — Live scaling during test run</h3>
                <p style="color:#8b949e; font-size:12px; margin-bottom:12px">Sampled every 15 seconds. Shows exactly when HPA scaled up pods as CPU spiked.</p>
                <canvas id="timelineChart" height="120"></canvas>
              </div>

              <div style="background:#161b22; border:1px solid #30363d; border-radius:10px; padding:24px; margin-bottom:16px">
                <h3 style="color:#f0f6fc; font-size:15px; margin-bottom:16px">🧠 CPU Utilization Timeline — What triggered HPA</h3>
                <p style="color:#8b949e; font-size:12px; margin-bottom:12px">When CPU crossed 80% threshold, HPA fired and added pods. HPA threshold line shown in red.</p>
                <canvas id="cpuTimelineChart" height="120"></canvas>
              </div>

              <div style="background:#161b22; border:1px solid #30363d; border-radius:10px; padding:24px; margin-bottom:16px">
                <h3 style="color:#f0f6fc; font-size:15px; margin-bottom:16px">📊 Peak Replicas — Before vs Peak during tests</h3>
                <p style="color:#8b949e; font-size:12px; margin-bottom:12px">Maximum pods reached during the entire test run per browser.</p>
                <canvas id="peakChart" height="100"></canvas>
              </div>

              <div style="background:#161b22; border:1px solid #30363d; border-radius:10px; padding:24px; margin-bottom:16px">
                <h3 style="color:#f0f6fc; font-size:15px; margin-bottom:16px">⚡ Threads vs Slots — Did we have enough capacity?</h3>
                <p style="color:#8b949e; font-size:12px; margin-bottom:12px">5 threads per browser needed. HPA scaled pods to provide enough slots.</p>
                <canvas id="slotsChart" height="100"></canvas>
              </div>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
            <script>
              Chart.defaults.color = '#8b949e';
              Chart.defaults.borderColor = '#30363d';

              const labels = [${TIMELINE_LABELS}];

              // Chart 1 - Replica Timeline
              new Chart(document.getElementById('timelineChart'), {
                type: 'line',
                data: {
                  labels: labels,
                  datasets: [
                    { label: 'Chrome pods', data: [${CHROME_DATA}], borderColor: '#4285f4', backgroundColor: 'rgba(66,133,244,0.1)', tension: 0.3, fill: true, pointRadius: 4 },
                    { label: 'Firefox pods', data: [${FIREFOX_DATA}], borderColor: '#e6522c', backgroundColor: 'rgba(230,82,44,0.1)', tension: 0.3, fill: true, pointRadius: 4 },
                    { label: 'Edge pods', data: [${EDGE_DATA}], borderColor: '#3fb950', backgroundColor: 'rgba(63,185,80,0.1)', tension: 0.3, fill: true, pointRadius: 4 }
                  ]
                },
                options: {
                  plugins: { legend: { labels: { color: '#e6edf3' } } },
                  scales: {
                    y: { beginAtZero: true, max: 6, ticks: { stepSize: 1, color: '#8b949e' }, grid: { color: '#21262d' }, title: { display: true, text: 'Pod Count', color: '#8b949e' } },
                    x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e', maxRotation: 45 } }
                  }
                }
              });

              // Chart 2 - CPU Timeline
              new Chart(document.getElementById('cpuTimelineChart'), {
                type: 'line',
                data: {
                  labels: labels,
                  datasets: [
                    { label: 'Chrome CPU %', data: [${CHROME_CPU_DATA}], borderColor: '#4285f4', backgroundColor: 'rgba(66,133,244,0.1)', tension: 0.3, fill: false, pointRadius: 3 },
                    { label: 'Firefox CPU %', data: [${FIREFOX_CPU_DATA}], borderColor: '#e6522c', backgroundColor: 'rgba(230,82,44,0.1)', tension: 0.3, fill: false, pointRadius: 3 },
                    { label: 'Edge CPU %', data: [${EDGE_CPU_DATA}], borderColor: '#3fb950', backgroundColor: 'rgba(63,185,80,0.1)', tension: 0.3, fill: false, pointRadius: 3 },
                    { label: 'HPA threshold (80%)', data: Array(labels.length).fill(80), borderColor: '#f85149', borderDash: [5,5], pointRadius: 0, fill: false }
                  ]
                },
                options: {
                  plugins: { legend: { labels: { color: '#e6edf3' } } },
                  scales: {
                    y: { beginAtZero: true, max: 150, ticks: { callback: v => v + '%', color: '#8b949e' }, grid: { color: '#21262d' }, title: { display: true, text: 'CPU %', color: '#8b949e' } },
                    x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e', maxRotation: 45 } }
                  }
                }
              });

              // Chart 3 - Peak Replicas Before vs Peak
              new Chart(document.getElementById('peakChart'), {
                type: 'bar',
                data: {
                  labels: ['Chrome', 'Firefox', 'Edge'],
                  datasets: [
                    { label: 'Pods at start', data: [${BEFORE_CHROME}, ${BEFORE_FIREFOX}, ${BEFORE_EDGE}], backgroundColor: '#f85149', borderRadius: 6 },
                    { label: 'Peak pods during tests', data: [${PEAK_CHROME:-1}, ${PEAK_FIREFOX:-1}, ${PEAK_EDGE:-1}], backgroundColor: '#3fb950', borderRadius: 6 }
                  ]
                },
                options: {
                  plugins: { legend: { labels: { color: '#e6edf3' } } },
                  scales: {
                    y: { beginAtZero: true, max: 6, ticks: { stepSize: 1, color: '#8b949e' }, grid: { color: '#21262d' } },
                    x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } }
                  }
                }
              });

              // Chart 4 - Threads vs Slots
              new Chart(document.getElementById('slotsChart'), {
                type: 'bar',
                data: {
                  labels: ['Chrome', 'Firefox', 'Edge'],
                  datasets: [
                    { label: 'Threads needed', data: [5, 5, 5], backgroundColor: '#d29922', borderRadius: 6 },
                    { label: 'Slots at peak (pods × 1 session)', data: [${PEAK_CHROME:-1}, ${PEAK_FIREFOX:-1}, ${PEAK_EDGE:-1}], backgroundColor: '#3fb950', borderRadius: 6 }
                  ]
                },
                options: {
                  plugins: { legend: { labels: { color: '#e6edf3' } } },
                  scales: {
                    y: { beginAtZero: true, max: 12, ticks: { stepSize: 1, color: '#8b949e' }, grid: { color: '#21262d' } },
                    x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } }
                  }
                }
              });
            </script>

          </body>
          </html>
          PROMEOF

