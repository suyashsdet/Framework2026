name: Run Tests - Kubernetes (Selenium Grid)

# ============================================================
# WHAT THIS WORKFLOW DOES:
#   Spins up a real Kubernetes cluster on the GitHub runner
#   using "kind" (Kubernetes IN Docker), deploys a full
#   Selenium Grid (Hub + Chrome/Firefox/Edge nodes) as k8s
#   Deployments and Services, then runs the TestNG suite
#   against the Grid via RemoteWebDriver.
#
# WHY KUBERNETES INSTEAD OF PLAIN DOCKER:
#   - Docker Compose runs containers on ONE machine
#   - Kubernetes orchestrates containers across MANY nodes
#   - k8s gives you: auto-healing, scaling, rolling updates
#   - replicas: 2 per browser = 2 pods per browser running
#     simultaneously, each handling up to 5 sessions
#   - If a browser pod crashes, k8s restarts it automatically
#   - This is how real enterprise Selenium Grids are run
#
# HOW IT WORKS:
#   1. kind creates a local k8s cluster inside Docker on the runner
#   2. kubectl applies all 4 manifests from the k8s/ folder:
#        selenium-hub.yaml     → Hub Deployment + NodePort Service
#        selenium-chrome.yaml  → 2 Chrome node pods
#        selenium-firefox.yaml → 2 Firefox node pods
#        selenium-edge.yaml    → 2 Edge node pods
#   3. Workflow waits for all pods to reach Running state
#   4. kubectl port-forward exposes Hub port 4444 to localhost
#   5. Maven runs tests with -DSELENIUM_REMOTE_URL pointing
#      at the Hub — DriverFactory creates RemoteWebDriver
#   6. kind cluster is deleted after tests finish
# ============================================================

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to run tests on"
        type: choice
        options:
          - default
          - dev
          - qa
          - stage
          - uat
        default: default

      xml_file:
        description: "TestNG XML suite to run"
        type: choice
        options:
          - testng_all_test_default_parallel_multi_browser.xml
          - testng_all_test_default_sequential_multi_browser.xml
        default: testng_all_test_default_parallel_multi_browser.xml

      incognito:
        description: "Run browsers in incognito mode"
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: >
      Tests (Kubernetes) | ENV=${{ inputs.env }} | ${{ inputs.xml_file }}
    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------------------
      # STEP 1 - CHECKOUT
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # STEP 2 - SET UP JAVA 24
      # --------------------------------------------------------
      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      # --------------------------------------------------------
      # STEP 3 - CACHE MAVEN DEPENDENCIES
      # --------------------------------------------------------
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # --------------------------------------------------------
      # STEP 4 - INSTALL KIND (Kubernetes IN Docker)
      # --------------------------------------------------------
      # kind lets you run a full Kubernetes cluster locally
      # using Docker containers as the cluster nodes.
      # Every GitHub ubuntu-latest runner has Docker pre-installed
      # so kind works out of the box — no VM or cloud needed.
      # --------------------------------------------------------
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      # --------------------------------------------------------
      # STEP 5 - CREATE KUBERNETES CLUSTER
      # --------------------------------------------------------
      # Creates a single-node k8s cluster named "selenium-grid".
      # kind spins this up as a Docker container acting as both
      # the control plane and worker node.
      # --------------------------------------------------------
      - name: Create Kubernetes cluster with kind
        run: |
          kind create cluster --name selenium-grid --wait 60s
          kubectl cluster-info --context kind-selenium-grid
          kubectl get nodes

      # --------------------------------------------------------
      # STEP 6 - DEPLOY SELENIUM GRID TO KUBERNETES
      # --------------------------------------------------------
      # Applies all 4 manifests from the k8s/ folder:
      #   selenium-hub.yaml     → Hub pod + NodePort Service
      #   selenium-chrome.yaml  → 2 Chrome node pods
      #   selenium-firefox.yaml → 2 Firefox node pods
      #   selenium-edge.yaml    → 2 Edge node pods
      #
      # kubectl apply is idempotent — safe to run multiple times.
      # --------------------------------------------------------
      - name: Deploy Selenium Grid to Kubernetes
        run: |
          kubectl create namespace selenium-grid --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/selenium-hub.yaml
          kubectl apply -f k8s/selenium-chrome.yaml
          kubectl apply -f k8s/selenium-firefox.yaml
          kubectl apply -f k8s/selenium-edge.yaml
          kubectl apply -f k8s/hpa-chrome.yaml
          kubectl apply -f k8s/hpa-firefox.yaml
          kubectl apply -f k8s/hpa-edge.yaml
          echo "All manifests applied. Listing all pods:"
          kubectl get pods -n selenium-grid -o wide

      # --------------------------------------------------------
      # STEP 6b - DEPLOY PROMETHEUS + GRAFANA
      # --------------------------------------------------------
      # Deploys monitoring stack into the monitoring namespace.
      # Prometheus scrapes HPA and pod metrics every 15s.
      # Grafana visualizes scaling timeline as a dashboard.
      # kube-state-metrics provides HPA replica count metrics.
      # --------------------------------------------------------
      - name: Deploy Prometheus and Grafana monitoring
        run: |
          kubectl apply -f k8s/monitoring/prometheus-config.yaml
          kubectl apply -f k8s/monitoring/prometheus.yaml
          kubectl apply -f k8s/monitoring/grafana.yaml

          # Install kube-state-metrics for HPA metrics in Grafana
          kubectl apply -f https://github.com/kubernetes/kube-state-metrics/releases/download/v2.12.0/kube-state-metrics-deployment.yaml 2>/dev/null || true

          echo "Waiting for Prometheus..."
          kubectl rollout status deployment/prometheus -n monitoring --timeout=60s
          echo "Waiting for Grafana..."
          kubectl rollout status deployment/grafana -n monitoring --timeout=60s
          echo "Monitoring stack ready"

      # --------------------------------------------------------
      # STEP 6b - INSTALL METRICS SERVER
      # --------------------------------------------------------
      # HPA needs metrics-server to read CPU usage per pod.
      # --kubelet-insecure-tls is required for kind clusters
      # because kind uses self-signed certificates.
      # --------------------------------------------------------
      - name: Install metrics-server for HPA
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch deployment metrics-server -n kube-system \
            --type='json' \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl rollout status deployment/metrics-server -n kube-system --timeout=120s
          echo "Metrics server ready"
      # kubectl rollout status blocks until the Deployment
      # reports all replicas are Running and Ready.
      # --timeout=120s means if pods are not ready in 2 minutes,
      # the step fails with a clear error message.
      # --------------------------------------------------------
      - name: Wait for all Selenium pods to be ready
        run: |
          echo "Waiting for Hub..."
          kubectl rollout status deployment/grid-hub -n selenium-grid --timeout=120s

          echo "Waiting for Chrome nodes..."
          kubectl rollout status deployment/grid-node-chrome -n selenium-grid --timeout=120s

          echo "Waiting for Firefox nodes..."
          kubectl rollout status deployment/grid-node-firefox -n selenium-grid --timeout=120s

          echo "Waiting for Edge nodes..."
          kubectl rollout status deployment/grid-node-edge -n selenium-grid --timeout=120s

          echo "All pods are ready:"
          kubectl get pods -n selenium-grid -o wide

      # --------------------------------------------------------
      # STEP 8 - PORT FORWARD HUB TO LOCALHOST
      # --------------------------------------------------------
      # The Hub Service is NodePort 30444 inside the cluster.
      # kubectl port-forward maps it to localhost:4444 on the
      # runner so Maven can reach it at http://localhost:4444.
      # Running in background (&) so the step does not block.
      # Sleep 5 gives port-forward time to establish.
      # --------------------------------------------------------
      - name: Port-forward Selenium Hub to localhost:4444
        run: |
          kubectl port-forward service/grid-hub 4444:4444 -n selenium-grid &
          kubectl port-forward service/prometheus 9090:9090 -n monitoring &
          kubectl port-forward service/grafana 3000:3000 -n monitoring &
          sleep 5
          echo "Hub status:"
          curl -s http://localhost:4444/wd/hub/status | python3 -m json.tool || true
          echo "Prometheus status:"
          curl -s http://localhost:9090/-/ready || true
          echo "Grafana status:"
          curl -s http://localhost:3000/api/health || true

      # --------------------------------------------------------
      # STEP 9 - PRINT RUN CONFIGURATION
      # --------------------------------------------------------
      - name: Print run configuration
        run: |
          echo "=================================================="
          echo "  TEST RUN CONFIGURATION (Kubernetes Mode)"
          echo "=================================================="
          echo "  Environment   : ${{ inputs.env }}"
          echo "  Browsers      : Chrome + Firefox + Edge"
          echo "  XML Suite     : ${{ inputs.xml_file }}"
          echo "  Headless      : true (always in k8s pods)"
          echo "  Incognito     : ${{ inputs.incognito }}"
          echo "  Hub URL       : http://localhost:4444/wd/hub"
          echo "  Chrome pods   : 1 pod x 1 session = 1 slot (HPA scales to 5)"
          echo "  Firefox pods  : 1 pod x 1 session = 1 slot (HPA scales to 5)"
          echo "  Edge pods     : 1 pod x 1 session = 1 slot (HPA scales to 5)"
          echo "=================================================="
          echo "  BEFORE TESTS - Pod count:"
          kubectl get pods -n selenium-grid
          echo "  BEFORE TESTS - HPA state:"
          kubectl get hpa -n selenium-grid

      # --------------------------------------------------------
      # STEP 10 - RUN TESTS
      # --------------------------------------------------------
      # Single SELENIUM_REMOTE_URL points at the Hub.
      # The Hub routes each session to the correct browser node
      # based on the browser capability requested by DriverFactory.
      # -Dheadless=true is mandatory — k8s pods have no display.
      # --------------------------------------------------------
      - name: Run TestNG suite against Kubernetes Selenium Grid
        continue-on-error: true
        run: |
          ENV_FLAG=""
          if [ "${{ inputs.env }}" != "default" ]; then
            ENV_FLAG="-Denv=${{ inputs.env }}"
          fi

          mvn clean test $ENV_FLAG \
            -Dheadless=true \
            -Dincognito=${{ inputs.incognito }} \
            -DSELENIUM_REMOTE_URL=http://localhost:4444/wd/hub \
            -Dsurefire.suiteXmlFiles=src/test/resources/testrunners/${{ inputs.xml_file }} \
            -B

      # --------------------------------------------------------
      # STEP 11 - PRINT POD LOGS ON FAILURE (DEBUG)
      # --------------------------------------------------------
      # If tests fail, print Hub logs so you can see what
      # happened inside the cluster without SSH access.
      # --------------------------------------------------------
      - name: Print Selenium Hub logs
        if: always()
        run: |
          echo "=== AFTER TESTS - Pod count ==="
          kubectl get pods -n selenium-grid -o wide || true
          echo "=== AFTER TESTS - HPA state (shows if scaling happened) ==="
          kubectl get hpa -n selenium-grid || true
          echo "=== Selenium Hub Logs ==="
          kubectl logs deployment/grid-hub -n selenium-grid --tail=50 || true
          echo "=== Prometheus Targets ==="
          curl -s http://localhost:9090/api/v1/targets | python3 -c "import sys,json; d=json.load(sys.stdin); [print(t['labels'].get('job','?'), '-', t['health']) for t in d['data']['activeTargets']]" || true

      # --------------------------------------------------------
      # STEP 12 - GENERATE ALLURE REPORT
      # --------------------------------------------------------
      - name: Generate Allure report
        if: always()
        run: mvn allure:report -B

      # --------------------------------------------------------
      # STEP 13 - PREPARE GITHUB PAGES CONTENT
      # --------------------------------------------------------
      - name: Prepare GitHub Pages content
        if: always()
        run: |
          mkdir -p reports/testng reports/chaintest reports/allure

          cp -r target/surefire-reports/. reports/testng/ 2>/dev/null || echo "No TestNG report"
          cp -r target/chaintest/. reports/chaintest/ 2>/dev/null || echo "No ChainTest report"
          cp -r target/site/allure-maven-plugin/. reports/allure/ 2>/dev/null || echo "No Allure report"

          # Capture live kubectl data for scaling summary page
          PODS_AFTER=$(kubectl get pods -n selenium-grid --no-headers 2>/dev/null || echo "cluster deleted")
          HPA_AFTER=$(kubectl get hpa -n selenium-grid --no-headers 2>/dev/null || echo "cluster deleted")

          CHROME_REPLICAS=$(kubectl get hpa hpa-grid-node-chrome -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "N/A")
          FIREFOX_REPLICAS=$(kubectl get hpa hpa-grid-node-firefox -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "N/A")
          EDGE_REPLICAS=$(kubectl get hpa hpa-grid-node-edge -n selenium-grid -o jsonpath='{.status.currentReplicas}' 2>/dev/null || echo "N/A")

          CHROME_CPU=$(kubectl get hpa hpa-grid-node-chrome -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo "N/A")
          FIREFOX_CPU=$(kubectl get hpa hpa-grid-node-firefox -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo "N/A")
          EDGE_CPU=$(kubectl get hpa hpa-grid-node-edge -n selenium-grid -o jsonpath='{.status.currentMetrics[0].resource.current.averageUtilization}' 2>/dev/null || echo "N/A")

          RUN_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')

          # Capture Prometheus metrics
          PROM_HPA_CHROME=$(curl -s "http://localhost:9090/api/v1/query?query=kube_horizontalpodautoscaler_status_current_replicas{namespace='selenium-grid',horizontalpodautoscaler='hpa-grid-node-chrome'}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['result'][0]['value'][1] if d['data']['result'] else 'N/A')" 2>/dev/null || echo "N/A")
          PROM_HPA_FIREFOX=$(curl -s "http://localhost:9090/api/v1/query?query=kube_horizontalpodautoscaler_status_current_replicas{namespace='selenium-grid',horizontalpodautoscaler='hpa-grid-node-firefox'}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['result'][0]['value'][1] if d['data']['result'] else 'N/A')" 2>/dev/null || echo "N/A")
          PROM_HPA_EDGE=$(curl -s "http://localhost:9090/api/v1/query?query=kube_horizontalpodautoscaler_status_current_replicas{namespace='selenium-grid',horizontalpodautoscaler='hpa-grid-node-edge'}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['result'][0]['value'][1] if d['data']['result'] else 'N/A')" 2>/dev/null || echo "N/A")
          PROM_TARGETS=$(curl -s http://localhost:9090/api/v1/targets 2>/dev/null || echo '{}')

          cat > reports/prometheus.html << PROMEOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Prometheus Metrics - Framework2026</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #e6edf3; padding: 40px 20px; }
              h1 { font-size: 28px; color: #e6522c; margin-bottom: 6px; }
              .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 40px; }
              .section { margin-bottom: 40px; }
              h2 { font-size: 18px; color: #f0f6fc; margin-bottom: 16px; border-left: 4px solid #e6522c; padding-left: 12px; }
              .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
              .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 24px; text-align: center; }
              .card .label { font-size: 13px; color: #8b949e; margin-bottom: 8px; }
              .card .value { font-size: 48px; font-weight: bold; color: #e6522c; }
              .card .sub { font-size: 12px; color: #8b949e; margin-top: 6px; }
              .query-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 12px; }
              .query-box .query { font-family: monospace; font-size: 13px; color: #79c0ff; margin-bottom: 8px; }
              .query-box .desc { font-size: 13px; color: #8b949e; }
              .back { display: inline-block; margin-bottom: 30px; color: #e6522c; text-decoration: none; font-size: 14px; }
              .back:hover { text-decoration: underline; }
              .grafana-note { background: #161b22; border: 1px solid #f0883e; border-radius: 10px; padding: 24px; margin-bottom: 24px; }
              .grafana-note h3 { color: #f0883e; margin-bottom: 8px; }
              .grafana-note p { color: #8b949e; font-size: 14px; line-height: 1.6; }
            </style>
          </head>
          <body>
            <a href="index.html" class="back">← Back to Reports</a>
            <h1>🔥 Prometheus Metrics</h1>
            <p class="subtitle">Framework2026 · Selenium Grid on Kubernetes · $RUN_TIME</p>

            <div class="section">
              <div class="grafana-note">
                <h3>📊 About This Page</h3>
                <p>Prometheus was deployed inside the Kubernetes cluster during this test run.
                It scraped HPA and pod metrics every 15 seconds.
                The values below were captured via Prometheus API after tests completed.
                In a production setup, Grafana would show these as live time-series graphs
                with the full scaling timeline from 1 pod → 5 pods → back to 1 pod.</p>
              </div>
            </div>

            <div class="section">
              <h2>HPA Current Replicas (from Prometheus)</h2>
              <div class="grid3">
                <div class="card">
                  <div class="label">🟢 Chrome Replicas</div>
                  <div class="value">${PROM_HPA_CHROME}</div>
                  <div class="sub">kube_horizontalpodautoscaler_status_current_replicas</div>
                </div>
                <div class="card">
                  <div class="label">🦊 Firefox Replicas</div>
                  <div class="value">${PROM_HPA_FIREFOX}</div>
                  <div class="sub">kube_horizontalpodautoscaler_status_current_replicas</div>
                </div>
                <div class="card">
                  <div class="label">🔵 Edge Replicas</div>
                  <div class="value">${PROM_HPA_EDGE}</div>
                  <div class="sub">kube_horizontalpodautoscaler_status_current_replicas</div>
                </div>
              </div>
            </div>

            <div class="section">
              <h2>Prometheus Queries Used</h2>
              <div class="query-box">
                <div class="query">kube_horizontalpodautoscaler_status_current_replicas{namespace="selenium-grid"}</div>
                <div class="desc">Current replica count per HPA — shows scaling in action</div>
              </div>
              <div class="query-box">
                <div class="query">kube_horizontalpodautoscaler_status_desired_replicas{namespace="selenium-grid"}</div>
                <div class="desc">Desired replica count — what HPA wants vs what exists</div>
              </div>
              <div class="query-box">
                <div class="query">kube_pod_status_phase{namespace="selenium-grid", phase="Running"}</div>
                <div class="desc">Count of running pods — total grid capacity at any moment</div>
              </div>
              <div class="query-box">
                <div class="query">container_memory_working_set_bytes{namespace="selenium-grid"}</div>
                <div class="desc">Memory usage per pod — shows spike that triggered HPA scaling</div>
              </div>
            </div>

            <div class="section">
              <h2>Grafana Dashboard</h2>
              <div class="grafana-note">
                <h3>What Grafana Shows</h3>
                <p>
                  A pre-built Grafana dashboard was deployed with 5 panels:<br><br>
                  📈 <strong>Pod Count per Browser</strong> — time-series showing 1→5→1 scaling<br>
                  📈 <strong>HPA Desired Replicas</strong> — when HPA decided to scale<br>
                  📈 <strong>HPA Current vs Desired</strong> — lag between decision and actual scaling<br>
                  🔢 <strong>Total Running Pods</strong> — live count stat panel<br>
                  🔢 <strong>HPA Max Replicas</strong> — configured maximum per browser<br><br>
                  Grafana was accessible at <strong>http://localhost:3000</strong> during the run.<br>
                  Username: <strong>admin</strong> | Password: <strong>framework2026</strong>
                </p>
              </div>
            </div>

          </body>
          </html>
          PROMEOF

          cat > reports/kubernetes.html << HTMLEOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Kubernetes Scaling Summary - Framework2026</title>
