      - name: Upload reports to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      # --------------------------------------------------------
      # STEP 15 - DELETE KUBERNETES CLUSTER
      # --------------------------------------------------------
      # Always runs — cleans up the kind cluster even if tests
      # or any earlier step failed.
      # --------------------------------------------------------
      - name: Delete Kubernetes cluster
        if: always()
        run: kind delete cluster --name selenium-grid || true

