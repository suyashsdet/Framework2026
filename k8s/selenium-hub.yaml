apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-hub
  namespace: selenium-grid
  labels:
    app.kubernetes.io/name: grid-hub
    app.kubernetes.io/component: hub
    app.kubernetes.io/part-of: selenium-grid
    app.kubernetes.io/managed-by: argocd
    project: framework2026
    environment: ci
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grid-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grid-hub
        app.kubernetes.io/component: hub
        app.kubernetes.io/part-of: selenium-grid
        project: framework2026
        environment: ci
    spec:
      containers:
        - name: grid-hub
          image: selenium/hub:4.18.1
          ports:
            - name: webdriver
              containerPort: 4444
            - name: event-publish
              containerPort: 4442
            - name: event-subscribe
              containerPort: 4443
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /wd/hub/status
              port: 4444
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /wd/hub/status
              port: 4444
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: grid-hub
  namespace: selenium-grid
  labels:
    app.kubernetes.io/name: grid-hub
    app.kubernetes.io/component: hub
    app.kubernetes.io/part-of: selenium-grid
    project: framework2026
    environment: ci
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grid-hub
  ports:
    - name: webdriver
      port: 4444
      targetPort: 4444
      nodePort: 30444
    - name: event-publish
      port: 4442
      targetPort: 4442
    - name: event-subscribe
      port: 4443
      targetPort: 4443
