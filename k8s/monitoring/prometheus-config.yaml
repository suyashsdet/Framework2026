apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: selenium-grid-monitoring
    project: framework2026
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      # Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Scrape all pods in selenium-grid namespace
      - job_name: 'selenium-grid-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['selenium-grid']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_part_of]
            action: keep
            regex: selenium-grid
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_browser]
            target_label: browser
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component

      # Scrape kube-state-metrics for HPA and Deployment metrics
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.monitoring.svc.cluster.local:8080']

      # Scrape metrics-server via kube API
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
