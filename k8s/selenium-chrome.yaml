# ============================================================
# Selenium Grid — Chrome Node Deployment
# ============================================================
# replicas: 1 → starts with 1 pod (minimal baseline)
# HPA scales this up when tests create sessions, and back
# down to 1 when tests finish and CPU drops.
# SE_NODE_MAX_SESSIONS=1 → 1 session per pod for clean
# scaling (1 test = 1 pod, HPA math is straightforward).
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-node-chrome
  namespace: selenium-grid
  labels:
    app.kubernetes.io/name: selenium-node-chrome
    app.kubernetes.io/component: browser-node
    app.kubernetes.io/part-of: selenium-grid
    app.kubernetes.io/managed-by: argocd
    browser: chrome
    project: framework2026
    environment: ci
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: selenium-node-chrome
  template:
    metadata:
      labels:
        app.kubernetes.io/name: selenium-node-chrome
        app.kubernetes.io/component: browser-node
        app.kubernetes.io/part-of: selenium-grid
        browser: chrome
        project: framework2026
        environment: ci
    spec:
      containers:
        - name: selenium-node-chrome
          image: selenium/node-chrome:4.18.1
          env:
            - name: SE_EVENT_BUS_HOST
              value: "selenium-hub"
            - name: SE_EVENT_BUS_PUBLISH_PORT
              value: "4442"
            - name: SE_EVENT_BUS_SUBSCRIBE_PORT
              value: "4443"
            - name: SE_NODE_MAX_SESSIONS
              value: "1"
          resources:
            requests:
              cpu: "200m"
              memory: "800Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - mountPath: /dev/shm
              name: shared-memory
      volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
