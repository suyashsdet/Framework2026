# ============================================================
# Selenium Grid — Firefox Node Deployment
# ============================================================
# Runs a real Firefox browser inside a container.
# Same architecture as Chrome — 1 session per pod for clean
# HPA scaling. See selenium-chrome.yaml for detailed comments.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-node-firefox
  namespace: selenium-grid
  labels:
    app.kubernetes.io/name: selenium-node-firefox
    app.kubernetes.io/component: browser-node
    app.kubernetes.io/part-of: selenium-grid
    app.kubernetes.io/managed-by: argocd
    browser: firefox
    project: framework2026
    environment: ci
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: selenium-node-firefox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: selenium-node-firefox
        app.kubernetes.io/component: browser-node
        app.kubernetes.io/part-of: selenium-grid
        browser: firefox
        project: framework2026
        environment: ci
    spec:
      containers:
        - name: selenium-node-firefox
          image: selenium/node-firefox:4.27.0
          env:
            - name: SE_EVENT_BUS_HOST
              value: "selenium-hub"
            - name: SE_EVENT_BUS_PUBLISH_PORT
              value: "4442"
            - name: SE_EVENT_BUS_SUBSCRIBE_PORT
              value: "4443"
            - name: SE_NODE_MAX_SESSIONS
              value: "1"
          resources:
            requests:
              cpu: "200m"
              memory: "600Mi"
            limits:
              cpu: "1000m"
              memory: "3Gi"
          volumeMounts:
            - mountPath: /dev/shm
              name: shared-memory
      volumes:
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 3Gi
