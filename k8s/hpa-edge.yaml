# ============================================================
# HPA — Edge Browser Nodes
# ============================================================
# FIXED: Previously had NO behavior section, which meant
# Kubernetes used defaults (5 min stabilization for scale-down).
# Edge pods would linger 5 minutes after tests finished.
# Now matches Chrome/Firefox: 30s scale-down stabilization.
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-grid-node-edge
  namespace: selenium-grid
  labels:
    app.kubernetes.io/name: hpa-grid-node-edge
    app.kubernetes.io/component: autoscaler
    app.kubernetes.io/part-of: selenium-grid
    app.kubernetes.io/managed-by: argocd
    browser: edge
    project: framework2026
    environment: ci
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grid-node-edge
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 4
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
