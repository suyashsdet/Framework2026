apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-edge
  labels:
    app: selenium-edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: selenium-edge
  template:
    metadata:
      labels:
        app: selenium-edge
    spec:
      containers:
        - name: selenium-edge
          image: selenium/node-edge:4.18.1
          env:
            - name: SE_EVENT_BUS_HOST
              value: "selenium-hub"
            - name: SE_EVENT_BUS_PUBLISH_PORT
              value: "4442"
            - name: SE_EVENT_BUS_SUBSCRIBE_PORT
              value: "4443"
            - name: SE_NODE_MAX_SESSIONS
              value: "2"
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
